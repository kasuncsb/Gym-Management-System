# OpenResty configuration for PowerWorld Gyms
# Routes /api/* directly to the backend container — bypasses Next.js rewrite in production.
# Exploits OpenResty's Lua + nginx capabilities for better control.

# ── Upstream servers ──────────────────────────────────────────────────────────
upstream backend {
    server 127.0.0.1:5000;  # or backend container exposed port
    keepalive 32;
}

upstream frontend {
    server 127.0.0.1:3000;  # or frontend container exposed port
    keepalive 32;
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;

    ssl_certificate     /etc/ssl/certs/yourdomain.pem;
    ssl_certificate_key /etc/ssl/certs/yourdomain-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Upload size (NIC documents up to 10MB per request, both files)
    client_max_body_size 10m;

    # ── API: route directly to backend (bypasses Next.js proxy rewrite) ───────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cookie security — ensure Secure flag is set for any Set-Cookie from backend
        # (Optional: OpenResty Lua can also add SameSite=Lax here if needed)
        proxy_cookie_flags ~ secure samesite=lax;

        # Timeout tuning
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Frontend: all other routes to Next.js ─────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";   # WebSocket for Next.js HMR (dev)
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}
