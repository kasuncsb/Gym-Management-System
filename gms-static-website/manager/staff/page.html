<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
            
    <meta name="theme-color" content="#ffffff">
<title>Manager Staff Analytics</title>
    <meta name="description" content="Monitor staff performance, productivity, and engagement">
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="icon" href="../../images/logo.png">
</head>
<body>
    <div class="min-h-screen bg-secondary flex flex-col">
        <nav class="bg-primary text-primary py-4 px-6 relative z-10 border-b border-primary shadow-sm">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <a href="../../manager-dashboard.html" class="flex items-center space-x-3 group">
                        <img src="../../images/logo.png" alt="PowerWorld Fitness Logo" width="48" height="48" class="transition-transform group-hover:scale-105">
                        <span class="text-xl font-bold text-primary group-hover:text-red-500 transition-colors">
                            PowerWorld Manager
                        </span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <div class="text-sm text-tertiary">Gym Manager</div>
                        <div class="text-primary font-semibold">Staff Analytics</div>
                    </div>
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-blue-600 rounded-full flex items-center justify-center">
                        <span class="text-white font-semibold">M</span>
                    </div>
                </div>
            </div>
        </nav>

        <main class="flex-1 px-6 py-8">
            <div class="max-w-7xl mx-auto">
                <header class="mb-8">
                    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6">
                        <div>
                            <h1 class="text-3xl font-bold text-primary mb-2">Staff Analytics</h1>
                            <p class="text-secondary" id="staff-subtitle">Monitor staff performance and track productivity</p>
                        </div>
                        <div class="flex flex-wrap items-center gap-3">
                            <button class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors" id="add-staff-btn">
                                Add Staff Member
                            </button>
                            <button class="px-4 py-2 bg-tertiary text-secondary rounded-lg hover:bg-gray-300 transition-colors" id="staff-report-btn">
                                Generate Report
                            </button>
                        </div>
                    </div>
                </header>

                <div class="mb-6 border-b border-primary">
                    <nav class="-mb-px flex space-x-8" id="staff-tabs">
                        <button data-tab="overview" class="py-2 px-1 border-b-2 font-medium text-sm border-red-500 text-red-500">
                            Overview
                        </button>
                        <button data-tab="directory" class="py-2 px-1 border-b-2 font-medium text-sm border-transparent text-tertiary hover:text-secondary hover:border-secondary">
                            Staff Directory
                        </button>
                    </nav>
                </div>

                <div class="mb-6 hidden" id="staff-search">
                    <input id="staff-search-input" type="text" placeholder="Search by name, email, role, or ID..." class="w-full max-w-xl px-4 py-2 border border-secondary rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                </div>

                <section id="staff-overview" class="space-y-8"></section>
                <section id="staff-directory" class="space-y-4 hidden"></section>
            </div>
        </main>
    </div>

    <div id="staff-modal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden">
        <div class="bg-primary rounded-lg shadow-xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto border border-primary">
            <div class="flex items-center justify-between p-6 border-b border-primary">
                <h2 class="text-xl font-semibold text-primary">Staff Details</h2>
                <button id="staff-modal-close" class="text-quaternary hover:text-secondary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-6 space-y-4" id="staff-modal-content"></div>
        </div>
    </div>

    <script src="../../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var state = {
                activeTab: 'overview',
                searchTerm: '',
                selectedStaff: null
            };

            var data = {
                overall: {
                    totalStaff: 5,
                    activeStaff: 4,
                    averagePerformance: 90,
                    averageSatisfaction: 4.7,
                    totalTasksCompleted: 576
                },
                departments: [
                    { name: 'Administration', staff: 1, performance: 95, satisfaction: 4.8 },
                    { name: 'Management', staff: 1, performance: 92, satisfaction: 4.7 },
                    { name: 'Training', staff: 2, performance: 89, satisfaction: 4.65 },
                    { name: 'Reception', staff: 1, performance: 85, satisfaction: 4.5 }
                ],
                trends: {
                    performance: '+5%',
                    satisfaction: '+0.2',
                    taskCompletion: '+12%'
                },
                staff: [
                    {
                        id: 'STF001',
                        name: 'Chamara Silva',
                        email: 'chamara.silva@email.com',
                        phone: '+94123456784',
                        role: 'admin',
                        hireDate: '2023-06-01',
                        status: 'active',
                        department: 'Administration',
                        performance: 95,
                        tasksCompleted: 156,
                        memberSatisfaction: 4.8,
                        lastActive: '2024-01-15 14:30'
                    },
                    {
                        id: 'STF002',
                        name: 'Ishara Wijesinghe',
                        email: 'ishara.wijesinghe@email.com',
                        phone: '+94123456783',
                        role: 'manager',
                        hireDate: '2023-08-15',
                        status: 'active',
                        department: 'Management',
                        performance: 92,
                        tasksCompleted: 143,
                        memberSatisfaction: 4.7,
                        lastActive: '2024-01-15 14:25'
                    },
                    {
                        id: 'STF003',
                        name: 'Ashan Bandara',
                        email: 'alex.b@email.com',
                        phone: '+94123456782',
                        role: 'instructor',
                        hireDate: '2023-09-10',
                        status: 'active',
                        department: 'Training',
                        performance: 88,
                        tasksCompleted: 98,
                        memberSatisfaction: 4.6,
                        lastActive: '2024-01-15 14:20'
                    },
                    {
                        id: 'STF004',
                        name: 'Malsha Gunawardena',
                        email: 'maria.g@email.com',
                        phone: '+94123456781',
                        role: 'receptionist',
                        hireDate: '2023-10-05',
                        status: 'inactive',
                        department: 'Reception',
                        performance: 85,
                        tasksCompleted: 67,
                        memberSatisfaction: 4.5,
                        lastActive: '2024-01-10 16:00'
                    },
                    {
                        id: 'STF005',
                        name: 'Kasun Wickramasinghe',
                        email: 'kasun.wickramasinghe@email.com',
                        phone: '+94123456780',
                        role: 'instructor',
                        hireDate: '2023-11-20',
                        status: 'active',
                        department: 'Training',
                        performance: 90,
                        tasksCompleted: 112,
                        memberSatisfaction: 4.7,
                        lastActive: '2024-01-15 14:15'
                    }
                ]
            };

            var tabs = document.getElementById('staff-tabs');
            var searchContainer = document.getElementById('staff-search');
            var searchInput = document.getElementById('staff-search-input');
            var overviewSection = document.getElementById('staff-overview');
            var directorySection = document.getElementById('staff-directory');
            var modal = document.getElementById('staff-modal');
            var modalContent = document.getElementById('staff-modal-content');
            var modalClose = document.getElementById('staff-modal-close');

            function initials(name) {
                return name.split(' ').map(function(part) { return part.charAt(0); }).join('');
            }

            function roleClass(role) {
                if (role === 'admin') {
                    return 'text-red-400 bg-red-500/20';
                }
                if (role === 'manager') {
                    return 'text-blue-400 bg-blue-500/20';
                }
                if (role === 'instructor') {
                    return 'text-green-400 bg-green-500/20';
                }
                if (role === 'receptionist') {
                    return 'text-purple-400 bg-purple-500/20';
                }
                return 'text-quaternary bg-secondary0/20';
            }

            function statusClass(status) {
                return status === 'active' ? 'text-green-400 bg-green-500/20' : 'text-quaternary bg-secondary0/20';
            }

            function performanceClass(score) {
                if (score >= 90) {
                    return 'text-green-500';
                }
                if (score >= 80) {
                    return 'text-yellow-500';
                }
                return 'text-red-500';
            }

            function renderOverview() {
                var metrics = [
                    { label: 'Total Staff', value: data.overall.totalStaff, icon: '👥', tone: 'from-blue-500 to-blue-600' },
                    { label: 'Active Staff', value: data.overall.activeStaff, icon: '✅', tone: 'from-green-500 to-green-600' },
                    { label: 'Avg Performance', value: data.overall.averagePerformance + '%', icon: '📊', tone: 'from-yellow-500 to-yellow-600' },
                    { label: 'Avg Satisfaction', value: data.overall.averageSatisfaction + '/5', icon: '⭐', tone: 'from-purple-500 to-purple-600' }
                ];

                var metricsGrid = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">' +
                    metrics.map(function(metric) {
                        return (
                            '<div class="bg-primary p-6 rounded-lg shadow-sm border border-primary">' +
                                '<div class="flex items-center">' +
                                    '<div class="w-8 h-8 bg-gradient-to-br ' + metric.tone + ' rounded-full flex items-center justify-center text-white">' + metric.icon + '</div>' +
                                    '<div class="ml-4">' +
                                        '<p class="text-sm text-secondary">' + metric.label + '</p>' +
                                        '<p class="text-2xl font-bold text-primary">' + metric.value + '</p>' +
                                    '</div>' +
                                '</div>' +
                            '</div>'
                        );
                    }).join('') +
                '</div>';

                var departmentCards = '<div class="bg-primary rounded-lg shadow-sm border border-primary p-6">' +
                    '<h3 class="text-lg font-semibold text-primary mb-4">Department Performance</h3>' +
                    '<div class="space-y-4">' +
                    data.departments.map(function(dept) {
                        return (
                            '<div class="flex items-center justify-between p-4 bg-secondary rounded-lg">' +
                                '<div>' +
                                    '<h4 class="font-medium text-primary">' + dept.name + '</h4>' +
                                    '<p class="text-sm text-secondary">' + dept.staff + ' staff member' + (dept.staff !== 1 ? 's' : '') + '</p>' +
                                '</div>' +
                                '<div class="flex items-center space-x-6">' +
                                    '<div class="text-center"><p class="text-sm text-secondary">Performance</p><p class="text-lg font-semibold text-primary">' + dept.performance + '%</p></div>' +
                                    '<div class="text-center"><p class="text-sm text-secondary">Satisfaction</p><p class="text-lg font-semibold text-primary">' + dept.satisfaction + '/5</p></div>' +
                                '</div>' +
                            '</div>'
                        );
                    }).join('') +
                    '</div>' +
                '</div>';

                var trends = '<div class="bg-primary rounded-lg shadow-sm border border-primary p-6">' +
                    '<h3 class="text-lg font-semibold text-primary mb-4">Performance Trends</h3>' +
                    '<div class="grid grid-cols-1 md:grid-cols-3 gap-6">' +
                        '<div class="text-center"><div class="text-3xl font-bold text-green-500 mb-2">' + data.trends.performance + '</div><p class="text-sm text-secondary">Performance Improvement</p></div>' +
                        '<div class="text-center"><div class="text-3xl font-bold text-green-500 mb-2">+' + data.trends.satisfaction + '</div><p class="text-sm text-secondary">Satisfaction Increase</p></div>' +
                        '<div class="text-center"><div class="text-3xl font-bold text-green-500 mb-2">' + data.trends.taskCompletion + '</div><p class="text-sm text-secondary">Task Completion Rate</p></div>' +
                    '</div>' +
                '</div>';

                overviewSection.innerHTML = metricsGrid + departmentCards + trends;
            }

            function filteredStaff() {
                if (!state.searchTerm) {
                    return data.staff;
                }
                var term = state.searchTerm.toLowerCase();
                return data.staff.filter(function(member) {
                    return member.name.toLowerCase().includes(term) ||
                        member.email.toLowerCase().includes(term) ||
                        member.id.toLowerCase().includes(term) ||
                        member.role.toLowerCase().includes(term);
                });
            }

            function renderDirectory() {
                var staff = filteredStaff();
                if (staff.length === 0) {
                    directorySection.innerHTML = '<div class="text-center py-12 bg-primary rounded-lg border border-primary">' +
                        '<div class="text-quaternary text-5xl mb-4">📋</div>' +
                        '<h3 class="text-lg font-semibold text-primary mb-2">No staff members found</h3>' +
                        '<p class="text-sm text-secondary">Try adjusting your search terms</p>' +
                    '</div>';
                    return;
                }

                directorySection.innerHTML = staff.map(function(member) {
                    return (
                        `
                        <div class="bg-primary rounded-lg shadow-sm border border-primary p-6 hover:shadow-md transition-shadow">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center space-x-4">
                                    <div class="w-12 h-12 bg-tertiary rounded-full flex items-center justify-center">
                                        <span class="text-secondary font-semibold">${initials(member.name)}</span>
                                    </div>
                                    <div>
                                        <h3 class="text-lg font-semibold text-primary">${member.name}</h3>
                                        <p class="text-sm text-secondary">${member.email}</p>
                                        <div class="flex items-center space-x-2 mt-1">
                                            <span class="px-2 py-1 rounded-full text-xs font-semibold ${roleClass(member.role)}">${member.role}</span>
                                            <span class="px-2 py-1 rounded-full text-xs font-semibold ${statusClass(member.status)}">${member.status}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex items-center space-x-6">
                                    <div class="text-center">
                                        <p class="text-sm text-secondary">Performance</p>
                                        <p class="text-lg font-semibold ${performanceClass(member.performance)}">${member.performance}%</p>
                                    </div>
                                    <div class="text-center">
                                        <p class="text-sm text-secondary">Tasks</p>
                                        <p class="text-lg font-semibold text-primary">${member.tasksCompleted}</p>
                                    </div>
                                    <div class="text-center">
                                        <p class="text-sm text-secondary">Satisfaction</p>
                                        <p class="text-lg font-semibold text-primary">${member.memberSatisfaction}/5</p>
                                    </div>
                                    <div class="text-center">
                                        <p class="text-sm text-secondary">Last Active</p>
                                        <p class="text-sm text-primary">${member.lastActive}</p>
                                    </div>
                                    <button class="px-3 py-2 bg-blue-500 text-white text-sm rounded-lg hover:bg-blue-600 transition-colors" data-staff="${member.id}">View Details</button>
                                </div>
                            </div>
                        </div>
                        `
                    );
                }).join('');
            }

            function renderTabs() {
                Array.prototype.forEach.call(tabs.querySelectorAll('button'), function(button) {
                    var isActive = button.getAttribute('data-tab') === state.activeTab;
                    button.className = 'py-2 px-1 border-b-2 font-medium text-sm ' + (isActive ? 'border-red-500 text-red-500' : 'border-transparent text-tertiary hover:text-secondary hover:border-secondary');
                });

                if (state.activeTab === 'overview') {
                    searchContainer.classList.add('hidden');
                    overviewSection.classList.remove('hidden');
                    directorySection.classList.add('hidden');
                } else {
                    searchContainer.classList.remove('hidden');
                    overviewSection.classList.add('hidden');
                    directorySection.classList.remove('hidden');
                }
            }

            function openModal(member) {
                state.selectedStaff = member;
                modalContent.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <div class="w-16 h-16 bg-tertiary rounded-full flex items-center justify-center">
                            <span class="text-secondary font-semibold text-xl">${initials(member.name)}</span>
                        </div>
                        <div>
                            <h3 class="text-xl font-semibold text-primary">${member.name}</h3>
                            <p class="text-sm text-secondary">${member.id}</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-secondary p-4 rounded-lg"><p class="text-sm text-tertiary">Email</p><p class="text-sm text-primary">${member.email}</p></div>
                        <div class="bg-secondary p-4 rounded-lg"><p class="text-sm text-tertiary">Phone</p><p class="text-sm text-primary">${member.phone}</p></div>
                        <div class="bg-secondary p-4 rounded-lg"><p class="text-sm text-tertiary">Role</p><p class="text-sm text-primary capitalize">${member.role}</p></div>
                        <div class="bg-secondary p-4 rounded-lg"><p class="text-sm text-tertiary">Department</p><p class="text-sm text-primary">${member.department}</p></div>
                        <div class="bg-secondary p-4 rounded-lg"><p class="text-sm text-tertiary">Hire Date</p><p class="text-sm text-primary">${member.hireDate}</p></div>
                        <div class="bg-secondary p-4 rounded-lg"><p class="text-sm text-tertiary">Last Active</p><p class="text-sm text-primary">${member.lastActive}</p></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-primary border border-primary rounded-lg p-4 text-center"><p class="text-sm text-secondary">Performance</p><p class="text-lg font-semibold ${performanceClass(member.performance)}">${member.performance}%</p></div>
                        <div class="bg-primary border border-primary rounded-lg p-4 text-center"><p class="text-sm text-secondary">Tasks Completed</p><p class="text-lg font-semibold text-primary">${member.tasksCompleted}</p></div>
                        <div class="bg-primary border border-primary rounded-lg p-4 text-center"><p class="text-sm text-secondary">Satisfaction</p><p class="text-lg font-semibold text-primary">${member.memberSatisfaction}/5</p></div>
                    </div>
                    <div class="flex justify-end space-x-3 pt-4 border-t border-primary">
                        <button class="px-4 py-2 bg-tertiary text-secondary rounded-lg hover:bg-gray-300 transition-colors">Assign Task</button>
                        <button class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors">View History</button>
                    </div>
                `;
                modal.classList.remove('hidden');
            }

            function closeModal() {
                state.selectedStaff = null;
                modal.classList.add('hidden');
            }

            tabs.addEventListener('click', function(event) {
                var tab = event.target.closest('button[data-tab]');
                if (!tab) {
                    return;
                }
                state.activeTab = tab.getAttribute('data-tab');
                renderTabs();
                if (state.activeTab === 'directory') {
                    renderDirectory();
                }
            });

            searchInput.addEventListener('input', function(event) {
                state.searchTerm = event.target.value;
                renderDirectory();
            });

            directorySection.addEventListener('click', function(event) {
                var button = event.target.closest('button[data-staff]');
                if (!button) {
                    return;
                }
                var id = button.getAttribute('data-staff');
                var staffMember = data.staff.find(function(item) { return item.id === id; });
                if (staffMember) {
                    openModal(staffMember);
                }
            });

            modalClose.addEventListener('click', closeModal);
            modal.addEventListener('click', function(event) {
                if (event.target === modal) {
                    closeModal();
                }
            });

            document.getElementById('staff-report-btn').addEventListener('click', function() {
                document.getElementById('staff-subtitle').textContent = 'Compiling staff performance report...';
                setTimeout(function() {
                    document.getElementById('staff-subtitle').textContent = 'Staff report ready for review';
                }, 1200);
            });

            renderTabs();
            renderOverview();
        });
    </script>
</body>
</html>
