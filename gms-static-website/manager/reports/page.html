<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
            
    <meta name="theme-color" content="#ffffff">
<title>Manager Reports &amp; Analytics</title>
    <meta name="description" content="Generate gym performance reports and analytics">
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="icon" href="../../images/logo.png">
</head>
<body>
    <div class="min-h-screen bg-secondary flex flex-col">
        <nav class="bg-primary text-primary py-4 px-6 relative z-10 border-b border-primary shadow-sm">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <a href="../../manager-dashboard.html" class="flex items-center space-x-3 group">
                        <img src="../../images/logo.png" alt="PowerWorld Fitness Logo" width="48" height="48" class="transition-transform group-hover:scale-105">
                        <span class="text-xl font-bold text-primary group-hover:text-red-500 transition-colors">
                            PowerWorld Manager
                        </span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <div class="text-sm text-tertiary">Gym Manager</div>
                        <div class="text-primary font-semibold">Reports &amp; Analytics</div>
                    </div>
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-blue-600 rounded-full flex items-center justify-center">
                        <span class="text-white font-semibold">M</span>
                    </div>
                </div>
            </div>
        </nav>

        <main class="flex-1 px-6 py-8">
            <div class="max-w-7xl mx-auto">
                <header class="mb-8">
                    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6">
                        <div>
                            <h1 class="text-3xl font-bold text-primary mb-2">Reports &amp; Analytics</h1>
                            <p class="text-secondary" id="reports-subtitle">Generate detailed reports for business insights</p>
                        </div>
                        <div class="flex flex-wrap items-center gap-3">
                            <button id="generate-report" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors">
                                Generate Report
                            </button>
                            <div class="flex space-x-2">
                                <button class="px-3 py-2 bg-tertiary text-secondary rounded-lg hover:bg-gray-300 transition-colors" data-export="pdf">
                                    PDF
                                </button>
                                <button class="px-3 py-2 bg-tertiary text-secondary rounded-lg hover:bg-gray-300 transition-colors" data-export="excel">
                                    Excel
                                </button>
                            </div>
                        </div>
                    </div>
                </header>

                <section class="bg-primary rounded-lg shadow-sm border border-primary p-6 mb-6">
                    <h2 class="text-lg font-semibold text-primary mb-4">Report Configuration</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-secondary mb-2" for="report-type">Report Type</label>
                            <select id="report-type" class="w-full px-3 py-2 border border-secondary rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent"></select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-secondary mb-2" for="start-date">Start Date</label>
                            <input id="start-date" type="date" class="w-full px-3 py-2 border border-secondary rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-secondary mb-2" for="end-date">End Date</label>
                            <input id="end-date" type="date" class="w-full px-3 py-2 border border-secondary rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                        </div>
                    </div>
                </section>

                <section class="mb-6">
                    <h2 class="text-lg font-semibold text-primary mb-4">Available Reports</h2>
                    <div id="report-type-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </section>

                <section class="bg-primary rounded-lg shadow-sm border border-primary p-6">
                    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4 mb-6">
                        <h2 id="report-title" class="text-xl font-semibold text-primary">Attendance Report</h2>
                        <div id="report-range" class="text-sm text-tertiary">2024-01-01 to 2024-01-31</div>
                    </div>
                    <div id="report-content" class="space-y-6"></div>
                </section>
            </div>
        </main>
    </div>

    <script src="../../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var state = {
                selectedReport: 'attendance',
                isGenerating: false,
                dateRange: { start: '2024-01-01', end: '2024-01-31' }
            };

            var data = {
                reportTypes: [
                    { id: 'attendance', name: 'Attendance Report', description: 'Member check-in patterns and gym utilization' },
                    { id: 'revenue', name: 'Revenue Report', description: 'Financial performance and subscription analytics' },
                    { id: 'membership', name: 'Membership Report', description: 'Member demographics and retention trends' },
                    { id: 'staff', name: 'Staff Performance', description: 'Staff productivity and activity metrics' },
                    { id: 'equipment', name: 'Equipment Usage', description: 'Equipment utilization and maintenance needs' },
                    { id: 'member-satisfaction', name: 'Member Satisfaction', description: 'Feedback and satisfaction survey results' }
                ],
                attendance: {
                    totalCheckIns: 2847,
                    averageDailyAttendance: 92,
                    peakHours: '6:00 PM - 8:00 PM',
                    memberRetention: 87.5,
                    hourlyBreakdown: [
                        { hour: '06:00', count: 15 },
                        { hour: '07:00', count: 45 },
                        { hour: '08:00', count: 38 },
                        { hour: '09:00', count: 25 },
                        { hour: '10:00', count: 20 },
                        { hour: '11:00', count: 18 },
                        { hour: '12:00', count: 22 },
                        { hour: '13:00', count: 15 },
                        { hour: '14:00', count: 20 },
                        { hour: '15:00', count: 25 },
                        { hour: '16:00', count: 35 },
                        { hour: '17:00', count: 55 },
                        { hour: '18:00', count: 78 },
                        { hour: '19:00', count: 85 },
                        { hour: '20:00', count: 65 },
                        { hour: '21:00', count: 40 },
                        { hour: '22:00', count: 20 }
                    ]
                },
                revenue: {
                    totalRevenue: 45680,
                    monthlyGrowth: 12.5,
                    averageTransaction: 3500,
                    subscriptionBreakdown: {
                        'Basic Monthly': { revenue: 13680, members: 456, percentage: 30 },
                        'Premium Monthly': { revenue: 19450, members: 389, percentage: 42.5 },
                        'Elite Monthly': { revenue: 19520, members: 244, percentage: 42.7 },
                        'Annual Basic': { revenue: 36900, members: 123, percentage: 80.8 }
                    }
                },
                membership: {
                    totalMembers: 1247,
                    newMembers: 89,
                    activeMembers: 1089,
                    churnRate: 3.2,
                    demographics: {
                        ageGroups: { '18-25': 25, '26-35': 40, '36-45': 25, '46+': 10 },
                        gender: { male: 60, female: 40 },
                        plans: { basic: 36.6, premium: 31.2, elite: 19.6, annual: 9.9 }
                    }
                }
            };

            var subtitle = document.getElementById('reports-subtitle');
            var reportTypeSelect = document.getElementById('report-type');
            var startDateInput = document.getElementById('start-date');
            var endDateInput = document.getElementById('end-date');
            var reportTypeGrid = document.getElementById('report-type-grid');
            var reportTitle = document.getElementById('report-title');
            var reportRange = document.getElementById('report-range');
            var reportContent = document.getElementById('report-content');
            var generateReportButton = document.getElementById('generate-report');

            function reportName(id) {
                var match = data.reportTypes.find(function(item) {
                    return item.id === id;
                });
                return match ? match.name : 'Report';
            }

            function renderReportOptions() {
                reportTypeSelect.innerHTML = data.reportTypes
                    .map(function(item) {
                        var selected = item.id === state.selectedReport ? 'selected' : '';
                        return '<option value="' + item.id + '" ' + selected + '>' + item.name + '</option>';
                    })
                    .join('');

                reportTypeGrid.innerHTML = data.reportTypes
                    .map(function(item) {
                        var isActive = item.id === state.selectedReport;
                        var classes = isActive ? 'border-red-500 bg-red-50' : 'border-primary bg-primary hover:border-secondary';
                        return (
                            '<button data-report="' + item.id + '" class="p-4 rounded-lg border-2 text-left transition-all ' + classes + '">' +
                                '<h3 class="font-semibold text-primary mb-1">' + item.name + '</h3>' +
                                '<p class="text-sm text-secondary">' + item.description + '</p>' +
                            '</button>'
                        );
                    })
                    .join('');
            }

            function renderAttendance() {
                var metrics = [
                    { label: 'Total Check-ins', value: data.attendance.totalCheckIns.toLocaleString(), tone: 'bg-blue-50 text-blue-700' },
                    { label: 'Avg Daily Attendance', value: data.attendance.averageDailyAttendance, tone: 'bg-green-50 text-green-700' },
                    { label: 'Peak Hours', value: data.attendance.peakHours, tone: 'bg-yellow-50 text-yellow-700' },
                    { label: 'Retention Rate', value: data.attendance.memberRetention + '%', tone: 'bg-purple-50 text-purple-700' }
                ];

                var metricGrid = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">' +
                    metrics.map(function(metric) {
                        return (
                            '<div class="rounded-lg ' + metric.tone + ' bg-opacity-20 p-4">' +
                                '<p class="text-sm font-medium">' + metric.label + '</p>' +
                                '<p class="text-2xl font-bold text-primary">' + metric.value + '</p>' +
                            '</div>'
                        );
                    }).join('') +
                '</div>';

                var hourly = '<div class="bg-primary rounded-lg border border-primary p-6">' +
                    '<h3 class="text-lg font-semibold text-primary mb-4">Hourly Attendance Pattern</h3>' +
                    '<div class="space-y-2">' +
                    data.attendance.hourlyBreakdown.map(function(hour) {
                        var relative = Math.min(100, Math.round((hour.count / 85) * 100));
                        return (
                            '<div class="flex items-center space-x-4">' +
                                '<div class="w-16 text-sm text-secondary">' + hour.hour + '</div>' +
                                '<div class="flex-1 bg-tertiary rounded-full h-4">' +
                                    '<div class="bg-blue-500 h-4 rounded-full" style="width: ' + relative + '%"></div>' +
                                '</div>' +
                                '<div class="w-12 text-sm text-primary font-medium">' + hour.count + '</div>' +
                            '</div>'
                        );
                    }).join('') +
                    '</div>' +
                '</div>';

                return metricGrid + hourly;
            }

            function renderRevenue() {
                var revenueCards = [
                    { label: 'Total Revenue', value: 'Rs. ' + data.revenue.totalRevenue.toLocaleString(), tone: 'bg-green-50 text-green-700' },
                    { label: 'Monthly Growth', value: '+' + data.revenue.monthlyGrowth + '%', tone: 'bg-blue-50 text-blue-700' },
                    { label: 'Avg Transaction', value: 'Rs. ' + data.revenue.averageTransaction.toLocaleString(), tone: 'bg-purple-50 text-purple-700' }
                ];

                var cardGrid = '<div class="grid grid-cols-1 md:grid-cols-3 gap-4">' +
                    revenueCards.map(function(card) {
                        return (
                            '<div class="rounded-lg ' + card.tone + ' bg-opacity-20 p-4">' +
                                '<p class="text-sm font-medium">' + card.label + '</p>' +
                                '<p class="text-2xl font-bold text-primary">' + card.value + '</p>' +
                            '</div>'
                        );
                    }).join('') +
                '</div>';

                var breakdown = '<div class="bg-primary rounded-lg border border-primary p-6">' +
                    '<h3 class="text-lg font-semibold text-primary mb-4">Subscription Revenue Breakdown</h3>' +
                    '<div class="space-y-4">' +
                    Object.keys(data.revenue.subscriptionBreakdown).map(function(plan) {
                        var item = data.revenue.subscriptionBreakdown[plan];
                        return (
                            '<div class="flex items-center justify-between p-4 bg-secondary rounded-lg">' +
                                '<div>' +
                                    '<h4 class="font-medium text-primary">' + plan + '</h4>' +
                                    '<p class="text-sm text-secondary">' + item.members + ' members</p>' +
                                '</div>' +
                                '<div class="text-right">' +
                                    '<p class="text-lg font-semibold text-primary">Rs. ' + item.revenue.toLocaleString() + '</p>' +
                                    '<p class="text-sm text-secondary">' + item.percentage + '% of total</p>' +
                                '</div>' +
                            '</div>'
                        );
                    }).join('') +
                    '</div>' +
                '</div>';

                return cardGrid + breakdown;
            }

            function renderMembership() {
                var summary = [
                    { label: 'Total Members', value: data.membership.totalMembers.toLocaleString(), tone: 'bg-blue-50 text-blue-700' },
                    { label: 'New Members', value: data.membership.newMembers, tone: 'bg-green-50 text-green-700' },
                    { label: 'Active Members', value: data.membership.activeMembers.toLocaleString(), tone: 'bg-purple-50 text-purple-700' },
                    { label: 'Churn Rate', value: data.membership.churnRate + '%', tone: 'bg-red-50 text-red-700' }
                ];

                var summaryGrid = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">' +
                    summary.map(function(item) {
                        return (
                            '<div class="rounded-lg ' + item.tone + ' bg-opacity-20 p-4">' +
                                '<p class="text-sm font-medium">' + item.label + '</p>' +
                                '<p class="text-2xl font-bold text-primary">' + item.value + '</p>' +
                            '</div>'
                        );
                    }).join('') +
                '</div>';

                var ageGroups = data.membership.demographics.ageGroups;
                var plans = data.membership.demographics.plans;

                var demographics = '<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">' +
                    '<div class="bg-primary rounded-lg border border-primary p-6">' +
                        '<h3 class="text-lg font-semibold text-primary mb-4">Age Distribution</h3>' +
                        '<div class="space-y-3">' +
                        Object.keys(ageGroups).map(function(range) {
                            var percentage = ageGroups[range];
                            return (
                                '<div class="flex items-center justify-between">' +
                                    '<span class="text-sm text-secondary">' + range + ' years</span>' +
                                    '<div class="flex items-center space-x-3">' +
                                        '<div class="w-32 bg-tertiary rounded-full h-2">' +
                                            '<div class="bg-green-500 h-2 rounded-full" style="width: ' + percentage + '%"></div>' +
                                        '</div>' +
                                        '<span class="text-sm font-medium text-primary">' + percentage + '%</span>' +
                                    '</div>' +
                                '</div>'
                            );
                        }).join('') +
                        '</div>' +
                    '</div>' +
                    '<div class="bg-primary rounded-lg border border-primary p-6">' +
                        '<h3 class="text-lg font-semibold text-primary mb-4">Plan Distribution</h3>' +
                        '<div class="space-y-3">' +
                        Object.keys(plans).map(function(plan) {
                            var percent = plans[plan];
                            return (
                                '<div class="flex items-center justify-between">' +
                                    '<span class="text-sm text-secondary capitalize">' + plan + '</span>' +
                                    '<div class="flex items-center space-x-3">' +
                                        '<div class="w-32 bg-tertiary rounded-full h-2">' +
                                            '<div class="bg-blue-500 h-2 rounded-full" style="width: ' + percent + '%"></div>' +
                                        '</div>' +
                                        '<span class="text-sm font-medium text-primary">' + percent + '%</span>' +
                                    '</div>' +
                                '</div>'
                            );
                        }).join('') +
                        '</div>' +
                    '</div>' +
                '</div>';

                return summaryGrid + demographics;
            }

            function renderPlaceholder() {
                return (
                    '<div class="text-center py-12">' +
                        '<div class="text-quaternary text-6xl mb-4">📊</div>' +
                        '<h3 class="text-lg font-medium text-primary mb-2">Report Preview</h3>' +
                        '<p class="text-tertiary">Select a configured report to view detailed analytics</p>' +
                    '</div>'
                );
            }

            function renderReportContent() {
                reportTitle.textContent = reportName(state.selectedReport);
                reportRange.textContent = state.dateRange.start + ' to ' + state.dateRange.end;

                if (state.selectedReport === 'attendance') {
                    reportContent.innerHTML = renderAttendance();
                    return;
                }

                if (state.selectedReport === 'revenue') {
                    reportContent.innerHTML = renderRevenue();
                    return;
                }

                if (state.selectedReport === 'membership') {
                    reportContent.innerHTML = renderMembership();
                    return;
                }

                reportContent.innerHTML = renderPlaceholder();
            }

            function handleReportChange(newReport) {
                state.selectedReport = newReport;
                renderReportOptions();
                renderReportContent();
            }

            reportTypeSelect.addEventListener('change', function(event) {
                handleReportChange(event.target.value);
            });

            reportTypeGrid.addEventListener('click', function(event) {
                var target = event.target.closest('button[data-report]');
                if (!target) {
                    return;
                }
                handleReportChange(target.getAttribute('data-report'));
            });

            startDateInput.addEventListener('change', function(event) {
                state.dateRange.start = event.target.value || state.dateRange.start;
                renderReportContent();
            });

            endDateInput.addEventListener('change', function(event) {
                state.dateRange.end = event.target.value || state.dateRange.end;
                renderReportContent();
            });

            document.body.addEventListener('click', function(event) {
                var exportButton = event.target.closest('button[data-export]');
                if (!exportButton) {
                    return;
                }
                var type = exportButton.getAttribute('data-export');
                subtitle.textContent = 'Preparing ' + type.toUpperCase() + ' export for ' + reportName(state.selectedReport).toLowerCase();
            });

            generateReportButton.addEventListener('click', function() {
                if (state.isGenerating) {
                    return;
                }
                state.isGenerating = true;
                generateReportButton.textContent = 'Generating...';
                subtitle.textContent = 'Generating ' + reportName(state.selectedReport).toLowerCase() + '...';
                setTimeout(function() {
                    state.isGenerating = false;
                    generateReportButton.textContent = 'Generate Report';
                    subtitle.textContent = reportName(state.selectedReport) + ' ready for review';
                }, 1500);
            });

            reportTypeSelect.value = state.selectedReport;
            startDateInput.value = state.dateRange.start;
            endDateInput.value = state.dateRange.end;

            renderReportOptions();
            renderReportContent();
        });
    </script>
</body>
</html>
