<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
            
    <meta name="theme-color" content="#ffffff">
<title>Appointments - PowerWorld Fitness</title>
    <meta name="description" content="Book and manage your gym appointments">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="images/logo.png">
</head>
<body>
    <div class="min-h-screen bg-secondary flex flex-col">
        <!-- Navigation Header -->
        <nav class="bg-primary text-primary py-4 px-6 relative z-10 border-b border-primary shadow-sm">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <a href="index.html" class="flex items-center space-x-3 group">
                        <img src="images/logo.png" alt="PowerWorld Fitness Logo" width="50" height="50" class="transition-transform group-hover:scale-105">
                        <span class="text-xl font-bold text-primary group-hover:text-red-500 transition-colors">
                            PowerWorld
                        </span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="dashboard.html" class="text-secondary hover:text-red-500 px-4 py-2 font-medium transition-colors">
                        Dashboard
                    </a>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 px-6 py-8">
            <div class="max-w-7xl mx-auto">
                <!-- Header -->
                <div class="mb-8">
                    <h1 class="text-3xl font-bold text-primary mb-2">Book Appointments</h1>
                    <p class="text-secondary">Schedule your training sessions and consultations</p>
                </div>

                <!-- View Toggle and Primary Action -->
                <div class="flex justify-between items-center mb-6">
                    <div class="flex space-x-2" id="appointmentViewToggle">
                        <button data-view="calendar" class="view-btn px-4 py-2 rounded-lg transition-colors bg-red-500 text-white hover:bg-red-600">
                            Calendar View
                        </button>
                        <button data-view="list" class="view-btn px-4 py-2 rounded-lg transition-colors bg-tertiary text-secondary hover:bg-gray-300">
                            List View
                        </button>
                    </div>
                    <button id="bookAppointmentPrimary" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg font-semibold transition-all duration-300 transform hover:scale-105 hover:shadow-lg flex items-center space-x-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v12m6-6H6" />
                        </svg>
                        <span>Book New Appointment</span>
                    </button>
                </div>

                <!-- Calendar View -->
                <div id="calendarView" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 bg-primary border border-primary rounded-lg p-6 shadow-sm">
                        <div class="flex justify-between items-center mb-6">
                            <div>
                                <h2 class="text-xl font-semibold text-primary" id="selectedDateLabel">January 2025</h2>
                                <p class="text-tertiary text-sm" id="selectedDateCaption">Select a day to begin booking</p>
                            </div>
                            <div class="flex space-x-2">
                                <button id="prevMonthBtn" class="p-2 hover:bg-tertiary rounded-lg transition-colors" aria-label="Previous Month">
                                    <svg class="w-5 h-5 text-quaternary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                                    </svg>
                                </button>
                                <button id="nextMonthBtn" class="p-2 hover:bg-tertiary rounded-lg transition-colors" aria-label="Next Month">
                                    <svg class="w-5 h-5 text-quaternary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="grid grid-cols-7 gap-2 mb-4 text-center text-secondary font-semibold">
                            <span>Sun</span>
                            <span>Mon</span>
                            <span>Tue</span>
                            <span>Wed</span>
                            <span>Thu</span>
                            <span>Fri</span>
                            <span>Sat</span>
                        </div>

                        <div id="calendarDays" class="grid grid-cols-7 gap-2"></div>
                    </div>

                    <div class="bg-primary border border-primary rounded-lg p-6 shadow-sm">
                        <h3 class="text-xl font-semibold text-primary mb-6">Book Appointment</h3>
                        <form id="appointmentForm" class="space-y-4">
                            <div>
                                <label for="trainerSelect" class="block text-sm font-medium text-secondary mb-2">Select Trainer</label>
                                <select id="trainerSelect" class="w-full bg-primary border border-secondary rounded-lg px-3 py-2 text-primary focus:outline-none focus:ring-2 focus:ring-red-500">
                                    <option value="">Choose a trainer</option>
                                </select>
                            </div>

                            <div>
                                <label for="appointmentTypeSelect" class="block text-sm font-medium text-secondary mb-2">Appointment Type</label>
                                <select id="appointmentTypeSelect" class="w-full bg-primary border border-secondary rounded-lg px-3 py-2 text-primary focus:outline-none focus:ring-2 focus:ring-red-500">
                                    <option value="">Select type</option>
                                </select>
                            </div>

                            <div>
                                <label for="timeSlotSelect" class="block text-sm font-medium text-secondary mb-2">Time Slot</label>
                                <select id="timeSlotSelect" class="w-full bg-primary border border-secondary rounded-lg px-3 py-2 text-primary focus:outline-none focus:ring-2 focus:ring-red-500">
                                    <option value="">Select time</option>
                                </select>
                            </div>

                            <div>
                                <label for="notesInput" class="block text-sm font-medium text-secondary mb-2">Notes (Optional)</label>
                                <textarea id="notesInput" rows="3" class="w-full bg-primary border border-secondary rounded-lg px-3 py-2 text-primary focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="Any specific requirements or goals..."></textarea>
                            </div>

                            <button type="submit" class="w-full bg-red-500 hover:bg-red-600 text-white py-3 rounded-lg font-semibold transition-colors">
                                Book Appointment
                            </button>
                        </form>
                    </div>
                </div>

                <!-- List View -->
                <div id="listView" class="hidden space-y-8">
                    <div class="bg-primary border border-primary rounded-lg p-6 shadow-sm">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-xl font-semibold text-primary">Upcoming Appointments</h2>
                            <button class="text-red-500 hover:text-red-600 text-sm font-medium transition-colors" id="openCalendarFromList">
                                Book another
                            </button>
                        </div>
                        <div id="upcomingAppointmentsList" class="space-y-4"></div>
                    </div>

                    <div class="bg-primary border border-primary rounded-lg p-6 shadow-sm">
                        <h2 class="text-xl font-semibold text-primary mb-6">Past Appointments</h2>
                        <div id="pastAppointmentsList" class="space-y-4"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
