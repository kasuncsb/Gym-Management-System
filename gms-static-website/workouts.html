<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
            
    <meta name="theme-color" content="#ffffff">
<title>Workouts - PowerWorld Fitness</title>
    <meta name="description" content="Browse and select workout plans">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="images/logo.png">
</head>
<body>
    <div class="min-h-screen bg-secondary flex flex-col">
        <!-- Navigation Header -->
        <nav class="bg-primary text-primary py-4 px-6 relative z-10 border-b border-primary shadow-sm">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <a href="index.html" class="flex items-center space-x-3 group">
                        <img src="images/logo.png" alt="PowerWorld Fitness Logo" width="50" height="50" class="transition-transform group-hover:scale-105">
                        <span class="text-xl font-bold text-primary group-hover:text-red-500 transition-colors">
                            PowerWorld
                        </span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="dashboard.html" class="text-secondary hover:text-primary transition-colors">
                        Back to Dashboard
                    </a>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 px-6 py-8">
            <div class="max-w-7xl mx-auto">
                <!-- Header -->
                <div class="mb-8">
                    <h1 class="text-3xl font-bold text-primary mb-2">Workout Plans</h1>
                    <p class="text-secondary">Choose from our curated collection of workout routines</p>
                </div>

                <!-- Active Workout Overlay -->
                <div id="workoutOverlay" class="fixed inset-0 bg-gray-900/80 z-50 items-center justify-center hidden">
                    <div class="bg-primary border border-primary rounded-lg p-8 max-w-md w-full mx-4 shadow-lg">
                        <div class="text-center mb-6">
                            <h3 id="activeWorkoutName" class="text-2xl font-bold text-primary mb-2"></h3>
                            <div id="workoutTimer" class="text-4xl font-mono text-red-500 mb-4">00:00</div>
                            <p class="text-secondary">Workout in progress...</p>
                        </div>
                        <div class="flex space-x-4">
                            <button onclick="endWorkout()" class="flex-1 bg-red-500 hover:bg-red-600 text-white py-3 rounded-lg font-semibold transition-colors">
                                End Workout
                            </button>
                            <button id="pauseResumeBtn" onclick="toggleWorkout()" class="flex-1 bg-tertiary hover:bg-gray-300 text-secondary py-3 rounded-lg font-semibold transition-colors">
                                Pause
                            </button>
                        </div>
                        </div>
                    </div>

                <!-- Filters -->
                <div class="mb-8">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <!-- Category Filter -->
                        <div>
                            <label class="block text-sm font-medium text-secondary mb-2">Category</label>
                            <select id="categoryFilter" class="w-full bg-primary border border-secondary rounded-lg px-3 py-2 text-primary focus:outline-none focus:ring-2 focus:ring-red-500">
                                <option value="all">All Workouts</option>
                                <option value="strength">Strength Training</option>
                                <option value="cardio">Cardio</option>
                                <option value="hiit">HIIT</option>
                                <option value="yoga">Yoga & Flexibility</option>
                                <option value="functional">Functional</option>
                            </select>
                        </div>

                        <!-- Difficulty Filter -->
                        <div>
                            <label class="block text-sm font-medium text-secondary mb-2">Difficulty</label>
                            <select id="difficultyFilter" class="w-full bg-primary border border-secondary rounded-lg px-3 py-2 text-primary focus:outline-none focus:ring-2 focus:ring-red-500">
                                <option value="all">All Levels</option>
                                <option value="beginner">Beginner</option>
                                <option value="intermediate">Intermediate</option>
                                <option value="advanced">Advanced</option>
                            </select>
                    </div>

                        <!-- Duration Filter -->
                        <div>
                            <label class="block text-sm font-medium text-secondary mb-2">Duration</label>
                            <select id="durationFilter" class="w-full bg-primary border border-secondary rounded-lg px-3 py-2 text-primary focus:outline-none focus:ring-2 focus:ring-red-500">
                                <option value="all">Any Duration</option>
                                <option value="15">15 min</option>
                                <option value="30">30 min</option>
                                <option value="45">45 min</option>
                                <option value="60">60+ min</option>
                            </select>
                        </div>
                        </div>
                    </div>

                <!-- Workout Grid -->
                <div id="workoutGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Workouts will be populated by JavaScript -->
                            </div>

                <!-- No Results Message -->
                <div id="noResults" class="text-center py-12 hidden">
                    <div class="w-16 h-16 mx-auto mb-4 bg-tertiary rounded-full flex items-center justify-center">
                        <svg class="w-8 h-8 text-quaternary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                    </svg>
                    </div>
                    <h3 class="text-xl font-semibold text-primary mb-2">No workouts found</h3>
                    <p class="text-secondary">Try adjusting your filters to see more results</p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Workout data matching the Next.js version
        const workoutPlans = [
            {
                id: 1,
                name: 'Upper Body Strength',
                category: 'strength',
                difficulty: 'intermediate',
                duration: 45,
                calories: 320,
                exercises: 8,
                description: 'Build upper body strength with compound movements',
                image: 'images/workouts/upper-body-strength.jpg',
                exerciseList: [
                    { name: 'Bench Press', sets: 4, reps: '8-10', rest: '2-3 min' },
                    { name: 'Pull-ups', sets: 3, reps: '6-8', rest: '2-3 min' },
                    { name: 'Overhead Press', sets: 3, reps: '8-10', rest: '2-3 min' },
                    { name: 'Barbell Rows', sets: 3, reps: '8-10', rest: '2-3 min' },
                    { name: 'Dips', sets: 3, reps: '8-12', rest: '1-2 min' },
                    { name: 'Bicep Curls', sets: 3, reps: '10-12', rest: '1-2 min' },
                    { name: 'Tricep Extensions', sets: 3, reps: '10-12', rest: '1-2 min' },
                    { name: 'Plank', sets: 3, reps: '30-60 sec', rest: '1 min' }
                ]
            },
            {
                id: 2,
                name: 'HIIT Cardio Blast',
                category: 'hiit',
                difficulty: 'advanced',
                duration: 30,
                calories: 450,
                exercises: 6,
                description: 'High-intensity interval training for maximum fat burn',
                image: 'images/workouts/hiit.jpg',
                exerciseList: [
                    { name: 'Burpees', sets: 4, reps: '30 sec', rest: '30 sec' },
                    { name: 'Mountain Climbers', sets: 4, reps: '30 sec', rest: '30 sec' },
                    { name: 'Jump Squats', sets: 4, reps: '30 sec', rest: '30 sec' },
                    { name: 'High Knees', sets: 4, reps: '30 sec', rest: '30 sec' },
                    { name: 'Push-ups', sets: 4, reps: '30 sec', rest: '30 sec' },
                    { name: 'Jumping Lunges', sets: 4, reps: '30 sec', rest: '30 sec' }
                ]
            },
            {
                id: 3,
                name: 'Morning Yoga Flow',
                category: 'yoga',
                difficulty: 'beginner',
                duration: 30,
                calories: 150,
                exercises: 10,
                description: 'Gentle yoga flow to start your day with energy',
                image: 'images/workouts/yoga.jpg',
                exerciseList: [
                    { name: 'Child\'s Pose', sets: 1, reps: '2 min', rest: '0' },
                    { name: 'Cat-Cow Stretch', sets: 1, reps: '1 min', rest: '0' },
                    { name: 'Downward Dog', sets: 1, reps: '1 min', rest: '0' },
                    { name: 'Warrior I', sets: 1, reps: '1 min each', rest: '0' },
                    { name: 'Warrior II', sets: 1, reps: '1 min each', rest: '0' },
                    { name: 'Triangle Pose', sets: 1, reps: '1 min each', rest: '0' },
                    { name: 'Tree Pose', sets: 1, reps: '1 min each', rest: '0' },
                    { name: 'Bridge Pose', sets: 1, reps: '1 min', rest: '0' },
                    { name: 'Cobra Pose', sets: 1, reps: '1 min', rest: '0' },
                    { name: 'Corpse Pose', sets: 1, reps: '3 min', rest: '0' }
                ]
            },
            {
                id: 4,
                name: 'Lower Body Power',
                category: 'strength',
                difficulty: 'intermediate',
                duration: 50,
                calories: 380,
                exercises: 7,
                description: 'Build explosive lower body strength and power',
                image: 'images/workouts/lower-body.jpg',
                exerciseList: [
                    { name: 'Squats', sets: 4, reps: '8-10', rest: '2-3 min' },
                    { name: 'Deadlifts', sets: 4, reps: '6-8', rest: '3-4 min' },
                    { name: 'Lunges', sets: 3, reps: '10 each', rest: '2-3 min' },
                    { name: 'Bulgarian Split Squats', sets: 3, reps: '8 each', rest: '2-3 min' },
                    { name: 'Romanian Deadlifts', sets: 3, reps: '10-12', rest: '2-3 min' },
                    { name: 'Calf Raises', sets: 4, reps: '15-20', rest: '1-2 min' },
                    { name: 'Wall Sit', sets: 3, reps: '30-60 sec', rest: '1-2 min' }
                ]
            },
            {
                id: 5,
                name: 'Core Crusher',
                category: 'functional',
                difficulty: 'intermediate',
                duration: 25,
                calories: 280,
                exercises: 8,
                description: 'Intense core workout for a strong midsection',
                image: 'images/workouts/core-crush.jpg',
                exerciseList: [
                    { name: 'Plank', sets: 3, reps: '45-60 sec', rest: '1 min' },
                    { name: 'Russian Twists', sets: 3, reps: '20 each', rest: '1 min' },
                    { name: 'Mountain Climbers', sets: 3, reps: '30 sec', rest: '1 min' },
                    { name: 'Bicycle Crunches', sets: 3, reps: '20 each', rest: '1 min' },
                    { name: 'Leg Raises', sets: 3, reps: '15-20', rest: '1 min' },
                    { name: 'Side Plank', sets: 3, reps: '30 sec each', rest: '1 min' },
                    { name: 'Dead Bug', sets: 3, reps: '10 each', rest: '1 min' },
                    { name: 'Hollow Hold', sets: 3, reps: '30-45 sec', rest: '1 min' }
                ]
            },
            {
                id: 6,
                name: 'Full Body Circuit',
                category: 'functional',
                difficulty: 'beginner',
                duration: 35,
                calories: 300,
                exercises: 6,
                description: 'Complete full body workout for all fitness levels',
                image: 'images/workouts/full-body.jpg',
                exerciseList: [
                    { name: 'Push-ups', sets: 3, reps: '8-12', rest: '1-2 min' },
                    { name: 'Squats', sets: 3, reps: '12-15', rest: '1-2 min' },
                    { name: 'Lunges', sets: 3, reps: '10 each', rest: '1-2 min' },
                    { name: 'Plank', sets: 3, reps: '30-45 sec', rest: '1-2 min' },
                    { name: 'Jumping Jacks', sets: 3, reps: '30 sec', rest: '1-2 min' },
                    { name: 'Burpees', sets: 3, reps: '5-8', rest: '1-2 min' }
                ]
            }
        ];

        // Workout state
        let activeWorkout = null;
        let workoutTimer = 0;
        let isWorkoutActive = false;
        let workoutInterval = null;

        // Initialize workouts page
        document.addEventListener('DOMContentLoaded', function() {
            initializeWorkoutsPage();
        });

        function initializeWorkoutsPage() {
            renderWorkouts();
            setupFilters();
        }

        function renderWorkouts() {
            const workoutGrid = document.getElementById('workoutGrid');
            const noResults = document.getElementById('noResults');
            
            const filteredWorkouts = getFilteredWorkouts();
            
            if (filteredWorkouts.length === 0) {
                workoutGrid.style.display = 'none';
                noResults.classList.remove('hidden');
                return;
            }
            
            workoutGrid.style.display = 'grid';
            noResults.classList.add('hidden');
            
            workoutGrid.innerHTML = filteredWorkouts.map(workout => createWorkoutCard(workout)).join('');
        }

        function createWorkoutCard(workout) {
            const difficultyColor = getDifficultyColor(workout.difficulty);
            
            return `
                <div class="bg-primary border border-primary rounded-lg overflow-hidden hover:border-red-500 transition-colors shadow-sm" data-workout-id="${workout.id}">
                    <div class="h-48 relative overflow-hidden">
                        <img src="${workout.image}" alt="${workout.name} workout" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
                    </div>
                    
                    <div class="p-6">
                        <div class="flex items-center justify-between mb-2">
                            <h3 class="text-xl font-semibold text-primary">${workout.name}</h3>
                            <span class="px-2 py-1 rounded-full text-xs font-semibold ${difficultyColor}">
                                ${workout.difficulty}
                            </span>
                        </div>
                        
                        <p class="text-secondary text-sm mb-4">${workout.description}</p>
                        
                        <div class="grid grid-cols-3 gap-4 mb-4 text-center">
                            <div>
                                <div class="text-2xl font-bold text-primary">${workout.duration}</div>
                                <div class="text-xs text-secondary">minutes</div>
                            </div>
                            <div>
                                <div class="text-2xl font-bold text-orange-500">${workout.calories}</div>
                                <div class="text-xs text-secondary">calories</div>
                            </div>
                            <div>
                                <div class="text-2xl font-bold text-blue-500">${workout.exercises}</div>
                                <div class="text-xs text-secondary">exercises</div>
                            </div>
                        </div>
                        
                        <div class="flex space-x-2">
                            <button onclick="startWorkout(${workout.id})" class="flex-1 bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg font-semibold transition-colors">
                                Start Workout
                            </button>
                            <button onclick="previewWorkout(${workout.id})" class="px-4 py-2 border border-secondary text-secondary hover:bg-tertiary rounded-lg transition-colors">
                                Preview
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function getDifficultyColor(difficulty) {
            switch (difficulty) {
                case 'beginner': return 'text-green-400 bg-green-500/20';
                case 'intermediate': return 'text-yellow-400 bg-yellow-500/20';
                case 'advanced': return 'text-red-400 bg-red-500/20';
                default: return 'text-quaternary bg-secondary0/20';
            }
        }

        function getFilteredWorkouts() {
            const categoryFilter = document.getElementById('categoryFilter').value;
            const difficultyFilter = document.getElementById('difficultyFilter').value;
            const durationFilter = document.getElementById('durationFilter').value;
            
            return workoutPlans.filter(workout => {
                const categoryMatch = categoryFilter === 'all' || workout.category === categoryFilter;
                const difficultyMatch = difficultyFilter === 'all' || workout.difficulty === difficultyFilter;
                const durationMatch = durationFilter === 'all' || 
                    (durationFilter === '15' && workout.duration <= 15) ||
                    (durationFilter === '30' && workout.duration > 15 && workout.duration <= 30) ||
                    (durationFilter === '45' && workout.duration > 30 && workout.duration <= 45) ||
                    (durationFilter === '60' && workout.duration > 45);
                
                return categoryMatch && difficultyMatch && durationMatch;
            });
        }

        function setupFilters() {
            const filters = ['categoryFilter', 'difficultyFilter', 'durationFilter'];
            filters.forEach(filterId => {
                const filter = document.getElementById(filterId);
                if (filter) {
                    filter.addEventListener('change', renderWorkouts);
                }
            });
        }

        function startWorkout(workoutId) {
            const workout = workoutPlans.find(w => w.id === workoutId);
            if (!workout) return;
            
            activeWorkout = workoutId;
            isWorkoutActive = true;
            workoutTimer = 0;
            
            // Show overlay
            const overlay = document.getElementById('workoutOverlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            document.getElementById('activeWorkoutName').textContent = workout.name;
            
            // Start timer
            workoutInterval = setInterval(() => {
                workoutTimer++;
                updateTimer();
            }, 1000);
            
            showNotification(`${workout.name} started!`, 'success');
        }

        function endWorkout() {
            if (workoutInterval) {
                clearInterval(workoutInterval);
                workoutInterval = null;
            }
            
            isWorkoutActive = false;
            activeWorkout = null;
            workoutTimer = 0;
            
            const overlay = document.getElementById('workoutOverlay');
            overlay.classList.add('hidden');
            overlay.classList.remove('flex');
            showNotification('Workout completed!', 'success');
        }

        function toggleWorkout() {
            const pauseResumeBtn = document.getElementById('pauseResumeBtn');
            
            if (isWorkoutActive) {
                // Pause
                clearInterval(workoutInterval);
                workoutInterval = null;
                pauseResumeBtn.textContent = 'Resume';
                pauseResumeBtn.classList.remove('bg-gray-200', 'hover:bg-gray-300');
                pauseResumeBtn.classList.add('bg-green-500', 'hover:bg-green-600', 'text-white');
            } else {
                // Resume
                workoutInterval = setInterval(() => {
                    workoutTimer++;
                    updateTimer();
                }, 1000);
                pauseResumeBtn.textContent = 'Pause';
                pauseResumeBtn.classList.remove('bg-green-500', 'hover:bg-green-600', 'text-white');
                pauseResumeBtn.classList.add('bg-gray-200', 'hover:bg-gray-300', 'text-secondary');
            }
            
            isWorkoutActive = !isWorkoutActive;
        }

        function updateTimer() {
            const mins = Math.floor(workoutTimer / 60);
            const secs = workoutTimer % 60;
            const timeString = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            document.getElementById('workoutTimer').textContent = timeString;
        }

        function previewWorkout(workoutId) {
            const workout = workoutPlans.find(w => w.id === workoutId);
            if (!workout) return;
            
            // Create preview modal
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-gray-900/80 flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-primary border border-primary rounded-lg p-8 max-w-2xl w-full mx-4 shadow-lg max-h-[90vh] overflow-y-auto">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-2xl font-bold text-primary">${workout.name}</h3>
                        <button onclick="this.closest('.fixed').remove()" class="text-quaternary hover:text-secondary">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                    
                    <div class="mb-6">
                        <img src="${workout.image}" alt="${workout.name}" class="w-full h-48 object-cover rounded-lg mb-4">
                        <p class="text-secondary mb-4">${workout.description}</p>
                        
                        <div class="grid grid-cols-4 gap-4 mb-6 text-center">
                            <div class="bg-secondary p-3 rounded-lg">
                                <div class="text-lg font-bold text-primary">${workout.duration}</div>
                                <div class="text-xs text-secondary">minutes</div>
                            </div>
                            <div class="bg-secondary p-3 rounded-lg">
                                <div class="text-lg font-bold text-orange-500">${workout.calories}</div>
                                <div class="text-xs text-secondary">calories</div>
                            </div>
                            <div class="bg-secondary p-3 rounded-lg">
                                <div class="text-lg font-bold text-blue-500">${workout.exercises}</div>
                                <div class="text-xs text-secondary">exercises</div>
                            </div>
                            <div class="bg-secondary p-3 rounded-lg">
                                <div class="text-lg font-bold ${getDifficultyColor(workout.difficulty).split(' ')[0]}">${workout.difficulty}</div>
                                <div class="text-xs text-secondary">level</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-6">
                        <h4 class="text-lg font-semibold text-primary mb-4">Exercise List</h4>
                        <div class="space-y-3">
                            ${workout.exerciseList.map(exercise => `
                                <div class="flex justify-between items-center p-3 bg-secondary rounded-lg">
                                    <div>
                                        <div class="font-semibold text-primary">${exercise.name}</div>
                                        <div class="text-sm text-secondary">${exercise.sets} sets • ${exercise.reps} reps</div>
                                    </div>
                                    <div class="text-sm text-tertiary">${exercise.rest}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="flex space-x-4">
                        <button onclick="startWorkout(${workout.id}); this.closest('.fixed').remove();" class="flex-1 bg-red-500 hover:bg-red-600 text-white py-3 rounded-lg font-semibold transition-colors">
                            Start Workout
                        </button>
                        <button onclick="this.closest('.fixed').remove()" class="px-6 py-3 border border-secondary text-secondary hover:bg-tertiary rounded-lg transition-colors">
                            Close
                        </button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
        }
    </script>
</body>
</html>
