<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
            
    <meta name="theme-color" content="#ffffff">
<title>Daily Tasks - PowerWorld Fitness</title>
    <meta name="description" content="Manage staff daily tasks, priorities, and completion status">
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="icon" href="../../images/logo.png">
</head>
<body>
    <div class="min-h-screen bg-secondary flex flex-col">
        <nav class="bg-primary text-primary py-4 px-6 relative z-10 border-b border-primary shadow-sm">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <a href="../../staff-dashboard.html" class="flex items-center space-x-3 group">
                        <img src="../../images/logo.png" alt="PowerWorld Fitness Logo" width="50" height="50" class="transition-transform group-hover:scale-105">
                        <span class="text-xl font-bold text-primary group-hover:text-red-500 transition-colors">PowerWorld Staff</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <div class="text-sm text-tertiary">Staff Member</div>
                        <div class="text-primary font-semibold">Daily Tasks</div>
                    </div>
                    <div class="w-10 h-10 bg-gradient-to-br from-green-500 to-green-600 rounded-full flex items-center justify-center">
                        <span class="text-white font-semibold text-sm">S</span>
                    </div>
                </div>
            </div>
        </nav>

        <main class="flex-1 px-6 py-8">
            <div class="max-w-7xl mx-auto">
                <header class="mb-8">
                    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6">
                        <div>
                            <h1 class="text-3xl font-bold text-primary mb-2">Daily Tasks</h1>
                            <p class="text-secondary" id="tasks-subtitle">Manage your daily assignments and responsibilities</p>
                        </div>
                        <div class="flex flex-wrap items-center gap-3">
                            <button class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors" id="tasks-add-btn">Add Task</button>
                            <button class="px-4 py-2 bg-tertiary text-secondary rounded-lg hover:bg-gray-300 transition-colors" id="tasks-schedule-btn">View Schedule</button>
                        </div>
                    </div>
                </header>

                <section class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-8" id="tasks-stats"></section>

                <section class="bg-primary rounded-lg shadow-sm border border-primary p-6 mb-8">
                    <h2 class="text-lg font-semibold text-primary mb-4">Filters</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label for="tasks-filter-status" class="block text-sm font-medium text-secondary mb-2">Status</label>
                            <select id="tasks-filter-status" class="w-full px-3 py-2 border border-secondary rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                                <option value="all">All Status</option>
                                <option value="pending">Pending</option>
                                <option value="in_progress">In Progress</option>
                                <option value="completed">Completed</option>
                            </select>
                        </div>
                        <div>
                            <label for="tasks-filter-priority" class="block text-sm font-medium text-secondary mb-2">Priority</label>
                            <select id="tasks-filter-priority" class="w-full px-3 py-2 border border-secondary rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                                <option value="all">All Priorities</option>
                                <option value="high">High</option>
                                <option value="medium">Medium</option>
                                <option value="low">Low</option>
                            </select>
                        </div>
                        <div>
                            <label for="tasks-filter-category" class="block text-sm font-medium text-secondary mb-2">Category</label>
                            <select id="tasks-filter-category" class="w-full px-3 py-2 border border-secondary rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                                <option value="all">All Categories</option>
                                <option value="Cleaning">Cleaning</option>
                                <option value="Maintenance">Maintenance</option>
                                <option value="Administrative">Administrative</option>
                                <option value="Safety">Safety</option>
                            </select>
                        </div>
                    </div>
                </section>

                <section class="space-y-4" id="tasks-list"></section>

                <div class="text-center py-12 hidden" id="tasks-empty-state">
                    <div class="text-quaternary text-4xl mb-4">✅</div>
                    <h3 class="text-lg font-medium text-primary mb-2">No tasks match your filters</h3>
                    <p class="text-secondary">Adjust the filters to review additional assignments</p>
                </div>
            </div>
        </main>
    </div>

    <div id="tasks-modal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden">
        <div class="bg-primary rounded-lg shadow-xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto border border-primary">
            <div class="flex items-center justify-between p-6 border-b border-primary">
                <h2 class="text-xl font-semibold text-primary">Task Details</h2>
                <button id="tasks-modal-close" class="text-quaternary hover:text-secondary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-6 space-y-6" id="tasks-modal-content"></div>
        </div>
    </div>

    <script src="../../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var state = {
                filters: {
                    status: 'all',
                    priority: 'all',
                    category: 'all'
                },
                selectedTask: null
            };

            var tasks = [
                { id: 1, title: 'Clean cardio equipment', description: 'Wipe down all treadmills, ellipticals, and stationary bikes', category: 'Cleaning', priority: 'high', status: 'pending', assignedTo: 'Current Staff', dueDate: '2025-01-15', estimatedTime: '30 min', location: 'Cardio Zone', completedBy: null, completedAt: null, notes: 'Use disinfectant spray and clean towels' },
                { id: 2, title: 'Restock towels', description: 'Refill towel dispensers in all areas', category: 'Maintenance', priority: 'medium', status: 'in_progress', assignedTo: 'Current Staff', dueDate: '2025-01-15', estimatedTime: '15 min', location: 'All Areas', completedBy: null, completedAt: null, notes: 'Check all towel stations' },
                { id: 3, title: 'Check equipment maintenance', description: 'Inspect all equipment for any issues or needed repairs', category: 'Maintenance', priority: 'low', status: 'completed', assignedTo: 'Current Staff', dueDate: '2025-01-14', estimatedTime: '45 min', location: 'All Areas', completedBy: 'Kasun Perera', completedAt: '2025-01-14 16:30', notes: 'All equipment checked, no issues found' },
                { id: 4, title: 'Empty trash bins', description: 'Empty all trash bins and replace liners', category: 'Cleaning', priority: 'medium', status: 'pending', assignedTo: 'Current Staff', dueDate: '2025-01-15', estimatedTime: '20 min', location: 'All Areas', completedBy: null, completedAt: null, notes: 'Check all floors and locker rooms' },
                { id: 5, title: 'Update member check-in log', description: 'Review and update the daily member check-in records', category: 'Administrative', priority: 'low', status: 'pending', assignedTo: 'Current Staff', dueDate: '2025-01-15', estimatedTime: '10 min', location: 'Reception', completedBy: null, completedAt: null, notes: 'Verify all entries are accurate' },
                { id: 6, title: 'Test emergency equipment', description: 'Test all emergency equipment and safety systems', category: 'Safety', priority: 'high', status: 'in_progress', assignedTo: 'Current Staff', dueDate: '2025-01-15', estimatedTime: '25 min', location: 'All Areas', completedBy: null, completedAt: null, notes: 'Check fire extinguishers, first aid kits, and emergency exits' },
                { id: 7, title: 'Organize weight room', description: 'Organize and clean the weight room area', category: 'Cleaning', priority: 'medium', status: 'completed', assignedTo: 'Current Staff', dueDate: '2025-01-14', estimatedTime: '35 min', location: 'Weight Room', completedBy: 'Nimali Fernando', completedAt: '2025-01-14 18:00', notes: 'All weights organized, floor mopped' },
                { id: 8, title: 'Check pool chemicals', description: 'Test and adjust pool chemical levels', category: 'Maintenance', priority: 'high', status: 'pending', assignedTo: 'Current Staff', dueDate: '2025-01-15', estimatedTime: '20 min', location: 'Pool Area', completedBy: null, completedAt: null, notes: 'Use test strips to check pH and chlorine levels' }
            ];

            var statsContainer = document.getElementById('tasks-stats');
            var listContainer = document.getElementById('tasks-list');
            var emptyState = document.getElementById('tasks-empty-state');
            var modal = document.getElementById('tasks-modal');
            var modalContent = document.getElementById('tasks-modal-content');
            var subtitle = document.getElementById('tasks-subtitle');

            function priorityColor(priority) {
                if (priority === 'high') { return 'text-red-400 bg-red-500/20'; }
                if (priority === 'medium') { return 'text-yellow-400 bg-yellow-500/20'; }
                if (priority === 'low') { return 'text-blue-400 bg-blue-500/20'; }
                return 'text-quaternary bg-secondary0/20';
            }

            function statusColor(status) {
                if (status === 'pending') { return 'text-yellow-400 bg-yellow-500/20'; }
                if (status === 'in_progress') { return 'text-blue-400 bg-blue-500/20'; }
                if (status === 'completed') { return 'text-green-400 bg-green-500/20'; }
                return 'text-quaternary bg-secondary0/20';
            }

            function categoryIcon(category) {
                if (category === 'Cleaning') { return '🧹'; }
                if (category === 'Maintenance') { return '🔧'; }
                if (category === 'Administrative') { return '📋'; }
                if (category === 'Safety') { return '🛡️'; }
                return '📝';
            }

            function isOverdue(dueDate, status) {
                if (status === 'completed') { return false; }
                var today = new Date().toISOString().split('T')[0];
                return dueDate < today;
            }

            function filteredTasks() {
                return tasks.filter(function(task) {
                    var matchesStatus = state.filters.status === 'all' || task.status === state.filters.status;
                    var matchesPriority = state.filters.priority === 'all' || task.priority === state.filters.priority;
                    var matchesCategory = state.filters.category === 'all' || task.category === state.filters.category;
                    return matchesStatus && matchesPriority && matchesCategory;
                });
            }

            function renderStats() {
                var pending = tasks.filter(function(task) { return task.status === 'pending'; }).length;
                var inProgress = tasks.filter(function(task) { return task.status === 'in_progress'; }).length;
                var completed = tasks.filter(function(task) { return task.status === 'completed'; }).length;
                var overdue = tasks.filter(function(task) { return isOverdue(task.dueDate, task.status); }).length;

                var cards = [
                    { label: 'Pending', value: pending, tone: 'from-yellow-500 to-yellow-600', icon: '⏳' },
                    { label: 'In Progress', value: inProgress, tone: 'from-blue-500 to-blue-600', icon: '🔄' },
                    { label: 'Completed', value: completed, tone: 'from-green-500 to-green-600', icon: '✅' },
                    { label: 'Overdue', value: overdue, tone: 'from-red-500 to-red-600', icon: '🚨' }
                ];

                statsContainer.innerHTML = cards.map(function(card) {
                    return (
                        '<div class="bg-primary p-6 rounded-lg shadow-sm border border-primary">' +
                            '<div class="flex items-center">' +
                                '<div class="w-8 h-8 rounded-full bg-gradient-to-br ' + card.tone + ' flex items-center justify-center text-white">' + card.icon + '</div>' +
                                '<div class="ml-4">' +
                                    '<p class="text-sm text-secondary">' + card.label + '</p>' +
                                    '<p class="text-2xl font-bold text-primary">' + card.value + '</p>' +
                                '</div>' +
                            '</div>' +
                        '</div>'
                    );
                }).join('');
            }

            function renderTasks() {
                var items = filteredTasks();
                listContainer.innerHTML = items.map(function(task) {
                    var startButton = task.status === 'pending' ? '<button class="px-3 py-2 bg-yellow-500 text-white text-sm rounded-lg hover:bg-yellow-600 transition-colors" data-action="start" data-task="' + task.id + '">Start</button>' : '';
                    var completeButton = task.status === 'in_progress' ? '<button class="px-3 py-2 bg-green-500 text-white text-sm rounded-lg hover:bg-green-600 transition-colors" data-action="complete" data-task="' + task.id + '">Complete</button>' : '';
                    var overdueBadge = isOverdue(task.dueDate, task.status) ? '<span class="px-2 py-1 rounded-full text-xs font-semibold text-red-400 bg-red-500/20">Overdue</span>' : '';
                    return (
                        '\n                        <div class="bg-primary rounded-lg shadow-sm border border-primary p-6 hover:shadow-md transition-shadow" data-task="' + task.id + '">\n                            <div class="flex items-start justify-between">\n                                <div class="flex items-start space-x-4">\n                                    <div class="w-12 h-12 bg-tertiary rounded-full flex items-center justify-center text-xl">' + categoryIcon(task.category) + '</div>\n                                    <div class="flex-1">\n                                        <div class="flex items-center space-x-3 mb-2">\n                                            <h3 class="text-lg font-semibold text-primary">' + task.title + '</h3>\n                                            <span class="px-2 py-1 rounded-full text-xs font-semibold ' + priorityColor(task.priority) + '">' + task.priority + '</span>\n                                            <span class="px-2 py-1 rounded-full text-xs font-semibold ' + statusColor(task.status) + '">' + task.status.replace(/_/g, ' ') + '</span>\n                                            ' + overdueBadge + '\n                                        </div>\n                                        <p class="text-sm text-secondary mb-3">' + task.description + '</p>\n                                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 text-sm text-tertiary">\n                                            <div><span class="font-medium">Due Date:</span> <span class="ml-1">' + task.dueDate + '</span></div>\n                                            <div><span class="font-medium">Time:</span> <span class="ml-1">' + task.estimatedTime + '</span></div>\n                                            <div><span class="font-medium">Location:</span> <span class="ml-1">' + task.location + '</span></div>\n                                            <div><span class="font-medium">Category:</span> <span class="ml-1">' + task.category + '</span></div>\n                                        </div>\n                                    </div>\n                                </div>\n                                <div class="flex flex-col space-y-2">\n                                    <button class="px-3 py-2 bg-blue-500 text-white text-sm rounded-lg hover:bg-blue-600 transition-colors" data-action="view" data-task="' + task.id + '">View</button>\n                                    ' + startButton + '\n                                    ' + completeButton + '\n                                </div>\n                            </div>\n                        </div>\n                        '
                    );
                }).join('');

                emptyState.classList.toggle('hidden', items.length > 0);
            }

            function openModal(task) {
                state.selectedTask = task;
                var completionBlock = task.status === 'completed' ? '\n                        <div class="bg-green-50 p-3 rounded-lg">\n                            <p class="text-sm text-green-700"><span class="font-medium">Completed By:</span> ' + task.completedBy + '</p>\n                            <p class="text-sm text-green-700"><span class="font-medium">Completed At:</span> ' + task.completedAt + '</p>\n                        </div>\n                    ' : '';
                modalContent.innerHTML = (
                    '\n                    <div class="space-y-4">\n                        <div class="flex items-center space-x-3">\n                            <div class="w-12 h-12 bg-tertiary rounded-full flex items-center justify-center text-2xl">' + categoryIcon(task.category) + '</div>\n                            <div>\n                                <h3 class="text-lg font-semibold text-primary">' + task.title + '</h3>\n                                <div class="flex items-center space-x-2 mt-1">\n                                    <span class="px-2 py-1 rounded-full text-xs font-semibold ' + priorityColor(task.priority) + '">' + task.priority + '</span>\n                                    <span class="px-2 py-1 rounded-full text-xs font-semibold ' + statusColor(task.status) + '">' + task.status.replace(/_/g, ' ') + '</span>\n                                </div>\n                            </div>\n                        </div>\n                        <div>\n                            <h4 class="font-medium text-secondary mb-2">Task Description</h4>\n                            <p class="text-sm text-secondary">' + task.description + '</p>\n                        </div>\n                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-secondary">\n                            <div class="bg-secondary p-3 rounded-lg"><span class="font-medium text-tertiary">Assigned To:</span> <span class="ml-1">' + task.assignedTo + '</span></div>\n                            <div class="bg-secondary p-3 rounded-lg"><span class="font-medium text-tertiary">Location:</span> <span class="ml-1">' + task.location + '</span></div>\n                            <div class="bg-secondary p-3 rounded-lg"><span class="font-medium text-tertiary">Due Date:</span> <span class="ml-1">' + task.dueDate + '</span></div>\n                            <div class="bg-secondary p-3 rounded-lg"><span class="font-medium text-tertiary">Estimated Time:</span> <span class="ml-1">' + task.estimatedTime + '</span></div>\n                        </div>\n                        <div class="bg-secondary p-3 rounded-lg"><span class="font-medium text-tertiary">Notes:</span> <span class="ml-1">' + task.notes + '</span></div>\n                        ' + completionBlock + '\n                        <div class="flex justify-end space-x-3 pt-4 border-t border-primary">\n                            <button class="px-4 py-2 bg-tertiary text-secondary rounded-lg hover:bg-gray-300 transition-colors" data-action="close">Close</button>\n                            <button class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors" data-action="complete" data-task="' + task.id + '">Mark Complete</button>\n                        </div>\n                    </div>\n                ');
                modal.classList.remove('hidden');
            }

            function closeModal() {
                state.selectedTask = null;
                modal.classList.add('hidden');
            }

            function updateStatus(id, newStatus) {
                tasks = tasks.map(function(task) {
                    if (task.id === id) {
                        return Object.assign({}, task, {
                            status: newStatus,
                            completedBy: newStatus === 'completed' ? 'Current Staff' : task.completedBy,
                            completedAt: newStatus === 'completed' ? new Date().toISOString().replace('T', ' ').slice(0, 16) : task.completedAt
                        });
                    }
                    return task;
                });
                renderStats();
                renderTasks();
            }

            function updateSubtitle(message) {
                subtitle.textContent = message;
                setTimeout(function() {
                    subtitle.textContent = 'Manage your daily assignments and responsibilities';
                }, 1400);
            }

            document.getElementById('tasks-filter-status').addEventListener('change', function(event) {
                state.filters.status = event.target.value;
                renderTasks();
            });

            document.getElementById('tasks-filter-priority').addEventListener('change', function(event) {
                state.filters.priority = event.target.value;
                renderTasks();
            });

            document.getElementById('tasks-filter-category').addEventListener('change', function(event) {
                state.filters.category = event.target.value;
                renderTasks();
            });

            listContainer.addEventListener('click', function(event) {
                var button = event.target.closest('button[data-action]');
                if (!button) { return; }
                var id = parseInt(button.getAttribute('data-task'), 10);
                var action = button.getAttribute('data-action');
                var task = tasks.find(function(item) { return item.id === id; });
                if (!task) { return; }
                if (action === 'view') {
                    openModal(task);
                    return;
                }
                if (action === 'start') {
                    updateStatus(id, 'in_progress');
                    updateSubtitle('Task moved to in progress');
                    showNotification('Marked as in progress: ' + task.title, 'success');
                } else if (action === 'complete') {
                    updateStatus(id, 'completed');
                    updateSubtitle('Great job completing the task');
                    showNotification('Task completed: ' + task.title, 'success');
                }
            });

            modalContent.addEventListener('click', function(event) {
                var modalButton = event.target.closest('button[data-action]');
                if (!modalButton) { return; }
                var action = modalButton.getAttribute('data-action');
                if (action === 'close') {
                    closeModal();
                    return;
                }
                if (action === 'complete' && state.selectedTask) {
                    updateStatus(state.selectedTask.id, 'completed');
                    updateSubtitle('Task marked complete');
                    showNotification('Task completed: ' + state.selectedTask.title, 'success');
                    closeModal();
                }
            });

            document.getElementById('tasks-modal-close').addEventListener('click', closeModal);
            modal.addEventListener('click', function(event) {
                if (event.target === modal) {
                    closeModal();
                }
            });

            document.getElementById('tasks-add-btn').addEventListener('click', function() {
                updateSubtitle('Opening task creation flow');
                showNotification('Task creation wizard coming soon', 'success');
            });

            document.getElementById('tasks-schedule-btn').addEventListener('click', function() {
                updateSubtitle('Launching schedule overview');
                showNotification('Schedule view loading', 'success');
            });

            renderStats();
            renderTasks();
        });
    </script>
</body>
</html>
