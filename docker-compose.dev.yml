
# ══════════════════════════════════════════════════════════════════════════════
#  LOCAL DEVELOPMENT ONLY — Hot Reload
# ══════════════════════════════════════════════════════════════════════════════
#
#  Usage:
#    docker compose -f docker-compose.dev.yml up
#    docker compose -f docker-compose.dev.yml up --build   # after package.json changes
#    docker compose -f docker-compose.dev.yml down -v      # remove named volumes too
#
#  What this does differently from docker-compose.yml:
#  • Builds lightweight single-stage images (no tsc compile, no nginx).
#  • Bind-mounts source code so file changes are picked up immediately:
#      - Backend:  tsx watch  → restarts on any .ts change
#      - Frontend: next dev   → HMR (hot module replacement) built-in
#  • Named volumes keep node_modules inside the container so the host mount
#    does not shadow the container-installed packages.
#  • Sets CHOKIDAR_USEPOLLING / WATCHPACK_POLLING for reliable file-change
#    detection on Windows (Docker Desktop bind mounts don't send FS events).
#
#  This file is NEVER used by the CI/CD pipeline (deploy.yml uses
#  docker-compose.yml + production Dockerfiles only).
# ══════════════════════════════════════════════════════════════════════════════

services:

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile.dev
    restart: "no"
    ports:
      - "${BACKEND_PORT}:${BACKEND_INTERNAL_PORT}"
    volumes:
      # Source code — changes here reflect instantly inside the container
      - ./Backend:/app
      # Keep node_modules from inside the container (don't let host mount shadow them)
      - backend_node_modules:/app/node_modules
    environment:
      NODE_ENV:             ${NODE_ENV}
      PORT:                 ${BACKEND_INTERNAL_PORT}
      DB_HOST:              ${DB_HOST}
      DB_PORT:              ${DB_PORT}
      DB_USER:              ${DB_USER}
      DB_PASSWORD:          ${DB_PASSWORD}
      DB_NAME:              ${DB_NAME}
      REDIS_URL:            ${REDIS_URL}
      JWT_ACCESS_SECRET:    ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET:   ${JWT_REFRESH_SECRET}
      FRONTEND_URL:         ${FRONTEND_URL}
      SMTP_HOST:            ${SMTP_HOST}
      SMTP_PORT:            ${SMTP_PORT}
      SMTP_USER:            ${SMTP_USER}
      SMTP_PASSWORD:        ${SMTP_PASSWORD}
      EMAIL_FROM:           ${EMAIL_FROM}
      OCI_NAMESPACE:        ${OCI_NAMESPACE}
      OCI_BUCKET:           ${OCI_BUCKET}
      OCI_REGION:           ${OCI_REGION}
      # ── Polling: required on Windows/WSL2 so tsx watch sees file changes ───
      CHOKIDAR_USEPOLLING:  "true"
      CHOKIDAR_INTERVAL:    "300"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${BACKEND_INTERNAL_PORT}/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - app

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.dev
    restart: "no"
    ports:
      # next dev serves on port 3000 directly — no nginx in dev
      - "${FRONTEND_PORT}:3000"
    volumes:
      # Source code
      - ./Frontend:/app
      # Preserve container node_modules
      - frontend_node_modules:/app/node_modules
      # Preserve Next.js build cache across restarts (optional but speeds up cold starts)
      - frontend_next_cache:/app/.next
    environment:
      NODE_ENV:                  ${NODE_ENV}
      # Used by Next.js rewrites (next.config.ts) to proxy /api/* → backend
      # Container can resolve "backend" via the shared "app" Docker network
      BACKEND_URL:               http://backend:5000
      NEXT_TELEMETRY_DISABLED:   "1"
      # ── Polling: required on Windows/WSL2 so next dev HMR detects changes ──
      WATCHPACK_POLLING:         "true"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app

volumes:
  backend_node_modules:
  frontend_node_modules:
  frontend_next_cache:

networks:
  app:
    driver: bridge
