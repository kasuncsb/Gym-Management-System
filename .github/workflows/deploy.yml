name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  deployments: write
  contents: read

jobs:
  deploy:
    name: Deploy on Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy source files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: ".,!Frontend/node_modules,!Frontend/.next,!Backend/node_modules,!Backend/dist,!.git"
          target: "~/Hosted/gms"
          timeout: 5m
          strip_components: 1
          overwrite: true

      - name: Build and Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 20m
          script: |
            cd ~/Hosted/gms
            
            # Stop and remove old containers
            docker compose down || true
            
            # Build the new images and start containers in the background
            docker compose up --build -d
            
            # Remove dangling images
            docker image prune -f
            
            echo "Deployment completed successfully!"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            echo "Waiting for backend to respond..."
            # Wait up to 50 seconds (10 attempts * 5 seconds)
            for i in $(seq 1 10); do
              if curl -sf http://localhost:3004/health > /dev/null 2>&1; then
                echo "Backend is healthy!"
                
                # If backend is healthy, make sure frontend is up
                if curl -sf http://localhost:3003 > /dev/null 2>&1; then
                  echo "Frontend is reachable!"
                  docker compose ps
                  exit 0
                fi
              fi
              echo "Attempt $i/10: waiting..."
              sleep 5
            done
            echo "Health check failed. Container logs:"
            docker compose logs --tail 30
            exit 1
