<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
            
    <meta name="theme-color" content="#ffffff">
<title>PowerWorld Fitness - Gym Management System</title>
    <meta name="description" content="Join Sri Lanka's #1 gym network – Your Fitness Journey Starts Here.">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="images/logo.png">
</head>
<body>
    <div class="min-h-screen bg-secondary flex flex-col">
        <!-- Navigation Header -->
        <nav class="bg-primary text-primary py-4 px-6 relative z-10 shadow-sm border-b border-primary">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <a href="index.html" class="flex items-center space-x-3 group">
                        <img src="images/logo.png" alt="PowerWorld Fitness Logo" width="50" height="50" class="transition-transform group-hover:scale-105">
                        <span class="text-xl font-bold text-primary group-hover:text-red-500 transition-colors">
                            PowerWorld
                        </span>
                    </a>
                </div>
                <div class="hidden md:flex space-x-8">
                    <a href="index.html" class="flex items-center space-x-2 text-secondary hover:text-red-500 transition-colors group">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                        </svg>
                        <span>Home</span>
                    </a>
                    <a href="#about" class="flex items-center space-x-2 text-secondary hover:text-red-500 transition-colors group">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <span>About</span>
                    </a>
                    <a href="#contact" class="flex items-center space-x-2 text-secondary hover:text-red-500 transition-colors group">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                        <span>Contact</span>
                    </a>
                </div>
                <div class="flex space-x-3">
                    <a href="login.html" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2.5 font-medium transition-all duration-300 transform hover:scale-105 hover:shadow-lg flex items-center space-x-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                        </svg>
                        <span>Login</span>
                    </a>
                    <a href="register.html" class="border-2 border-red-500 text-red-500 hover:bg-red-500 hover:text-white px-6 py-2.5 font-medium transition-all duration-300 transform hover:scale-105 hover:shadow-lg flex items-center space-x-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                        </svg>
                        <span>Register</span>
                    </a>
                </div>
            </div>
        </nav>

        <!-- Hero Section with Background Image -->
        <main class="flex-1 relative overflow-hidden">
            <!-- Background Image with Overlay -->
            <div class="absolute inset-0 z-0">
                <img src="images/hero-section.jpg" alt="PowerWorld Fitness Centre" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-br from-black/60 via-black/40 to-black/20"></div>
            </div>
            
            <!-- Content -->
            <div class="relative z-10 flex items-center justify-center min-h-full">
                <div class="text-center max-w-5xl mx-auto px-6 py-20">
                    <h1 class="text-6xl md:text-8xl font-bold text-white mb-6 drop-shadow-lg">
                        Welcome to <span class="text-red-500">PowerWorld!</span>
                    </h1>
                    <p class="text-xl md:text-2xl text-white mb-12 max-w-3xl mx-auto font-medium drop-shadow-md">
                        Join Sri Lanka's #1 gym network – Your Fitness Journey Starts Here.
                    </p>
                    <div class="flex flex-col sm:flex-row gap-6 justify-center">
                        <a href="register.html" class="group bg-red-600 hover:bg-red-700 text-white px-10 py-5 text-lg font-bold transition-all duration-300 transform hover:scale-105 hover:shadow-2xl flex items-center justify-center space-x-3 shadow-lg">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                            </svg>
                            <span>JOIN WITH US</span>
                            <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                            </svg>
                        </a>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="bg-tertiary text-secondary py-8 px-6 border-t border-primary">
            <div class="max-w-7xl mx-auto text-center">
                <p class="text-secondary mb-4">© 2025 Gym Management System. All rights reserved.</p>
                <div class="flex justify-center space-x-6">
                    <a href="#privacy" class="text-secondary hover:text-primary transition-colors">
                        Privacy Policy
                    </a>
                    <a href="#terms" class="text-secondary hover:text-primary transition-colors">
                        Terms of Service
                    </a>
                    <a href="#contact" class="text-secondary hover:text-primary transition-colors">
                        Contact Us
                    </a>
                </div>
            </div>
        </footer>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
