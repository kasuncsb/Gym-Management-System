<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
            
    <meta name="theme-color" content="#ffffff">
<title>Forgot Password - PowerWorld Fitness</title>
    <meta name="description" content="Reset your PowerWorld account password">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="images/logo.png">
</head>
<body>
    <div class="min-h-screen bg-secondary flex flex-col">
        <!-- Navigation Header -->
        <nav class="bg-primary text-primary py-4 px-6 relative z-10 shadow-sm border-b border-primary">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <a href="index.html" class="flex items-center space-x-3 group">
                        <img src="images/logo.png" alt="PowerWorld Fitness Logo" width="50" height="50" class="transition-transform group-hover:scale-105">
                        <span class="text-xl font-bold text-primary group-hover:text-red-500 transition-colors">
                            PowerWorld
                        </span>
                    </a>
                </div>
                <div class="flex space-x-3">
                    <a href="login.html" class="text-secondary hover:text-red-500 px-4 py-2 font-medium transition-colors">
                        Back to Login
                    </a>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 flex items-center justify-center px-6 py-12">
            <div class="w-full max-w-md">
                <!-- Forgot Password Card -->
                <div class="bg-primary shadow-2xl border border-primary overflow-hidden">
                    <!-- Header -->
                    <div class="px-8 py-10 text-center border-b border-primary">
                        <div class="flex justify-center mb-6">
                            <div class="w-16 h-16 bg-gradient-to-br from-red-500 to-red-600 flex items-center justify-center shadow-lg rounded-lg">
                                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m0 0a2 2 0 012 2v6a2 2 0 01-2 2H9a2 2 0 01-2-2V9a2 2 0 012-2m6 0V7a2 2 0 00-2-2M9 7a2 2 0 012-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v2M7 7h10" />
                                </svg>
                            </div>
                        </div>
                        <h1 class="text-3xl font-bold text-primary mb-2">
                            Forgot Password?
                        </h1>
                        <p class="text-secondary">
                            No worries! Enter your email address and we'll send you a link to reset your password.
                        </p>
                    </div>

                    <!-- Form -->
                    <form id="forgotPasswordForm" class="px-8 py-8 space-y-6">
                        <!-- Email Field -->
                        <div class="space-y-2">
                            <label for="email" class="block text-sm font-semibold text-secondary">
                                Email Address
                            </label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="h-5 w-5 text-quaternary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                                    </svg>
                                </div>
                                <input
                                    id="email"
                                    type="email"
                                    class="block w-full pl-10 pr-3 py-3 border border-secondary bg-primary text-primary placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all duration-200"
                                    placeholder="Enter your email address"
                                    required
                                />
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <button
                            type="submit"
                            class="w-full bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 disabled:from-gray-400 disabled:to-gray-500 text-white font-semibold py-3 px-4 transition-all duration-300 transform hover:scale-105 hover:shadow-xl disabled:scale-100 disabled:shadow-none flex items-center justify-center space-x-2"
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                            <span>Send Reset Link</span>
                        </button>

                        <!-- Divider -->
                        <div class="relative">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-secondary"></div>
                            </div>
                            <div class="relative flex justify-center text-sm">
                                <span class="px-2 bg-secondary text-tertiary">Remember your password?</span>
                            </div>
                        </div>

                        <!-- Back to Login -->
                        <div class="text-center">
                            <a href="login.html" class="text-red-500 hover:text-red-600 text-sm font-medium transition-colors">
                                Back to Sign In
                            </a>
                        </div>
                    </form>
                </div>

                <!-- Additional Info -->
                <div class="mt-8 text-center">
                    <p class="text-sm text-tertiary">
                        If you don't receive an email within a few minutes, check your spam folder or 
                        <a href="#contact" class="text-red-500 hover:text-red-600 transition-colors">
                            contact support
                        </a>
                    </p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Forgot password functionality
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('forgotPasswordForm');
            if (form) {
                form.addEventListener('submit', handleForgotPassword);
            }
        });

        async function handleForgotPassword(event) {
            event.preventDefault();
            
            const form = event.target;
            const email = form.querySelector('#email').value;
            const submitButton = form.querySelector('button[type="submit"]');
            
            // Show loading state
            submitButton.disabled = true;
            submitButton.innerHTML = `
                <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Sending...</span>
            `;
            
            // Simulate API call
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            // Redirect to success page
            window.location.href = 'forgot-password-success.html';
        }
    </script>
</body>
</html>
