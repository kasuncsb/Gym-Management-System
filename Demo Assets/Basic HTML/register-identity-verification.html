<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
            
    <meta name="theme-color" content="#ffffff">
<title>Identity Verification - PowerWorld Fitness</title>
    <meta name="description" content="Verify your identity for PowerWorld membership">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="images/logo.png">
</head>
<body>
    <div class="min-h-screen bg-secondary flex flex-col">
        <!-- Navigation Header -->
        <nav class="bg-primary text-primary py-4 px-6 relative z-10 shadow-sm border-b border-primary">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <a href="index.html" class="flex items-center space-x-3 group">
                        <img src="images/logo.png" alt="PowerWorld Fitness Logo" width="50" height="50" class="transition-transform group-hover:scale-105">
                        <span class="text-xl font-bold text-primary group-hover:text-red-500 transition-colors">
                            PowerWorld
                        </span>
                    </a>
                </div>
                <div class="flex space-x-3">
                    <a href="register-personal-details.html" class="text-secondary hover:text-red-500 px-4 py-2 font-medium transition-colors">
                        Back
                    </a>
                    <a href="index.html" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2.5 font-medium transition-all duration-300 transform hover:scale-105 hover:shadow-lg flex items-center space-x-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                        </svg>
                        <span>Home</span>
                    </a>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 flex items-center justify-center px-6 py-12">
            <div class="w-full max-w-2xl">
                <!-- Identity Verification Card -->
                <div class="bg-primary shadow-2xl border border-primary overflow-hidden">
                    <!-- Header -->
                    <div class="px-8 py-10 text-center border-b border-primary">
                        <div class="flex justify-center mb-6">
                            <div class="w-16 h-16 bg-gradient-to-br from-red-500 to-red-600 flex items-center justify-center shadow-lg rounded-lg">
                                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                </svg>
                            </div>
                        </div>
                        <h1 class="text-3xl font-bold text-primary mb-2">
                            Identity Verification
                        </h1>
                        <p class="text-secondary">
                            Upload your government-issued ID for verification. This helps us ensure account security.
                        </p>
                    </div>

                    <!-- Form -->
                    <form id="identityVerificationForm" class="px-8 py-8 space-y-6">
                        <!-- Document Type Selection -->
                        <div class="space-y-4">
                            <label class="block text-sm font-semibold text-secondary mb-3">
                                Select Document Type
                            </label>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <button
                                    type="button"
                                    id="passport"
                                    class="document-type-btn p-4 border-2 rounded-lg text-center transition-all duration-200 border-secondary hover:border-gray-400 text-secondary"
                                >
                                    <div class="flex justify-center mb-2 text-secondary">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                        </svg>
                                    </div>
                                    <div class="text-sm font-medium">Passport</div>
                                </button>
                                <button
                                    type="button"
                                    id="driving-license"
                                    class="document-type-btn p-4 border-2 rounded-lg text-center transition-all duration-200 border-secondary hover:border-gray-400 text-secondary"
                                >
                                    <div class="flex justify-center mb-2 text-secondary">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                        </svg>
                                    </div>
                                    <div class="text-sm font-medium">Driving License</div>
                                </button>
                                <button
                                    type="button"
                                    id="national-id"
                                    class="document-type-btn p-4 border-2 rounded-lg text-center transition-all duration-200 border-secondary hover:border-gray-400 text-secondary"
                                >
                                    <div class="flex justify-center mb-2 text-secondary">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2" />
                                        </svg>
                                    </div>
                                    <div class="text-sm font-medium">National ID</div>
                                </button>
                            </div>
                        </div>

                        <!-- Front Image Upload -->
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-secondary">
                                Front of Document
                            </label>
                            <div class="border-2 border-dashed border-secondary rounded-lg p-6 text-center hover:border-gray-400 transition-colors">
                                <div id="front-upload-area" data-uploaded="false">
                                    <input
                                        type="file"
                                        accept="image/*"
                                        id="front-upload"
                                        class="hidden"
                                    />
                                    <label
                                        for="front-upload"
                                        class="cursor-pointer flex flex-col items-center space-y-2"
                                    >
                                        <svg class="w-8 h-8 text-quaternary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                                        </svg>
                                        <span class="text-quaternary">Click to upload front image</span>
                                        <span class="text-xs text-quaternary">PNG, JPG up to 10MB</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Back Image Upload -->
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-secondary">
                                Back of Document
                            </label>
                            <div class="border-2 border-dashed border-secondary rounded-lg p-6 text-center hover:border-gray-400 transition-colors">
                                <div id="back-upload-area" data-uploaded="false">
                                    <input
                                        type="file"
                                        accept="image/*"
                                        id="back-upload"
                                        class="hidden"
                                    />
                                    <label
                                        for="back-upload"
                                        class="cursor-pointer flex flex-col items-center space-y-2"
                                    >
                                        <svg class="w-8 h-8 text-quaternary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                                        </svg>
                                        <span class="text-quaternary">Click to upload back image</span>
                                        <span class="text-xs text-quaternary">PNG, JPG up to 10MB</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <button
                            type="submit"
                            id="submitBtn"
                            disabled
                            class="w-full bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 disabled:from-gray-400 disabled:to-gray-500 text-white font-semibold py-3 px-4 transition-all duration-300 transform hover:scale-105 hover:shadow-xl disabled:scale-100 disabled:shadow-none flex items-center justify-center space-x-2"
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                            </svg>
                            <span>Upload Documents</span>
                        </button>

                        <!-- Back to Personal Details -->
                        <div class="text-center">
                            <a href="register-personal-details.html" class="text-sm text-secondary hover:text-red-500 transition-colors flex items-center justify-center space-x-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                                </svg>
                                <span>Back to Personal Details</span>
                            </a>
                        </div>
                    </form>
                </div>

                <!-- Progress Indicator -->
                <div class="mt-8 text-center">
                    <div class="flex justify-center space-x-2 mb-2">
                        <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                        <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                        <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                        <div class="w-3 h-3 bg-gray-600 rounded-full"></div>
                        <div class="w-3 h-3 bg-gray-600 rounded-full"></div>
                    </div>
                    <p class="text-xs text-secondary">Step 3 of 5</p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
