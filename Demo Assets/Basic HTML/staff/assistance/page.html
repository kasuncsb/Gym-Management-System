<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
            
    <meta name="theme-color" content="#ffffff">
<title>Member Assistance - PowerWorld Fitness</title>
    <meta name="description" content="Handle member support requests, prioritize actions, and log responses">
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="icon" href="../../images/logo.png">
</head>
<body>
    <div class="min-h-screen bg-secondary flex flex-col">
        <nav class="bg-primary text-primary py-4 px-6 relative z-10 border-b border-primary shadow-sm">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <a href="../../staff-dashboard.html" class="flex items-center space-x-3 group">
                        <img src="../../images/logo.png" alt="PowerWorld Fitness Logo" width="50" height="50" class="transition-transform group-hover:scale-105">
                        <span class="text-xl font-bold text-primary group-hover:text-red-500 transition-colors">PowerWorld Staff</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <div class="text-sm text-tertiary">Staff Member</div>
                        <div class="text-primary font-semibold">Member Assistance</div>
                    </div>
                    <div class="w-10 h-10 bg-gradient-to-br from-green-500 to-green-600 rounded-full flex items-center justify-center">
                        <span class="text-white font-semibold text-sm">S</span>
                    </div>
                </div>
            </div>
        </nav>

        <main class="flex-1 px-6 py-8">
            <div class="max-w-7xl mx-auto">
                <header class="mb-8">
                    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6">
                        <div>
                            <h1 class="text-3xl font-bold text-primary mb-2">Member Assistance</h1>
                            <p class="text-secondary" id="assistance-subtitle">Help members with their requests and issues</p>
                        </div>
                        <div class="flex flex-wrap items-center gap-3">
                            <button class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors" id="assistance-new-request">New Request</button>
                            <button class="px-4 py-2 bg-tertiary text-secondary rounded-lg hover:bg-gray-300 transition-colors" id="assistance-view-all">View All</button>
                        </div>
                    </div>
                </header>

                <section class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-8" id="assistance-stats"></section>

                <section class="bg-primary rounded-lg shadow-sm border border-primary p-6 mb-8">
                    <h2 class="text-lg font-semibold text-primary mb-4">Filters</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="assistance-filter-status" class="block text-sm font-medium text-secondary mb-2">Status</label>
                            <select id="assistance-filter-status" class="w-full px-3 py-2 border border-secondary rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                                <option value="all">All Status</option>
                                <option value="pending">Pending</option>
                                <option value="in_progress">In Progress</option>
                                <option value="completed">Completed</option>
                            </select>
                        </div>
                        <div>
                            <label for="assistance-filter-priority" class="block text-sm font-medium text-secondary mb-2">Priority</label>
                            <select id="assistance-filter-priority" class="w-full px-3 py-2 border border-secondary rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                                <option value="all">All Priorities</option>
                                <option value="high">High</option>
                                <option value="medium">Medium</option>
                                <option value="low">Low</option>
                            </select>
                        </div>
                    </div>
                </section>

                <section class="space-y-4" id="assistance-list"></section>

                <div class="text-center py-12 hidden" id="assistance-empty-state">
                    <div class="text-quaternary text-4xl mb-4">📝</div>
                    <h3 class="text-lg font-medium text-primary mb-2">No requests found</h3>
                    <p class="text-secondary">Try adjusting your filters to see more results</p>
                </div>
            </div>
        </main>
    </div>

    <div id="assistance-modal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden">
        <div class="bg-primary rounded-lg shadow-xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto border border-primary">
            <div class="flex items-center justify-between p-6 border-b border-primary">
                <h2 class="text-xl font-semibold text-primary">Respond to Request</h2>
                <button id="assistance-modal-close" class="text-quaternary hover:text-secondary">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-6 space-y-6" id="assistance-modal-content"></div>
        </div>
    </div>

    <script src="../../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var state = {
                filters: {
                    status: 'all',
                    priority: 'all'
                },
                selectedRequest: null
            };

            var requests = [
                { id: 1, member: 'Ishara Wijesinghe', memberId: 'MEM004', request: 'Need help with form on bench press', category: 'Form Check', priority: 'medium', status: 'pending', time: '5 min ago', location: 'Weight Room', description: 'Member is having trouble with proper form on bench press and needs guidance on technique.' },
                { id: 2, member: 'Ashan Bandara', memberId: 'MEM005', request: 'Equipment not working properly', category: 'Equipment Issue', priority: 'high', status: 'in_progress', time: '12 min ago', location: 'Cardio Zone', description: 'Treadmill #2 is making strange noises and the belt is slipping.' },
                { id: 3, member: 'Malsha Gunawardena', memberId: 'MEM006', request: 'Looking for workout recommendations', category: 'General Help', priority: 'low', status: 'completed', time: '18 min ago', location: 'Reception', description: 'New member looking for a beginner workout routine.' },
                { id: 4, member: 'Kasun Perera', memberId: 'MEM001', request: 'Can\'t access locker room', category: 'Access Issue', priority: 'high', status: 'pending', time: '3 min ago', location: 'Locker Room', description: 'Member\'s key card is not working for locker room access.' },
                { id: 5, member: 'Nimali Fernando', memberId: 'MEM002', request: 'Need spotter for heavy lifts', category: 'Safety', priority: 'medium', status: 'in_progress', time: '8 min ago', location: 'Weight Room', description: 'Member needs a spotter for deadlifts and squats.' },
                { id: 6, member: 'Chamara Jayasinghe', memberId: 'MEM003', request: 'Water fountain not working', category: 'Facility Issue', priority: 'low', status: 'completed', time: '25 min ago', location: 'Cardio Zone', description: 'Water fountain in cardio zone is not dispensing water.' }
            ];

            var statsContainer = document.getElementById('assistance-stats');
            var listContainer = document.getElementById('assistance-list');
            var emptyState = document.getElementById('assistance-empty-state');
            var modal = document.getElementById('assistance-modal');
            var modalContent = document.getElementById('assistance-modal-content');
            var subtitle = document.getElementById('assistance-subtitle');

            function priorityColor(priority) {
                if (priority === 'high') { return 'text-red-400 bg-red-500/20'; }
                if (priority === 'medium') { return 'text-yellow-400 bg-yellow-500/20'; }
                if (priority === 'low') { return 'text-blue-400 bg-blue-500/20'; }
                return 'text-quaternary bg-secondary0/20';
            }

            function statusColor(status) {
                if (status === 'pending') { return 'text-yellow-400 bg-yellow-500/20'; }
                if (status === 'in_progress') { return 'text-blue-400 bg-blue-500/20'; }
                if (status === 'completed') { return 'text-green-400 bg-green-500/20'; }
                return 'text-quaternary bg-secondary0/20';
            }

            function categoryIcon(category) {
                if (category === 'Form Check') { return '🏋️'; }
                if (category === 'Equipment Issue') { return '🔧'; }
                if (category === 'General Help') { return '❓'; }
                if (category === 'Access Issue') { return '🔑'; }
                if (category === 'Safety') { return '🛡️'; }
                if (category === 'Facility Issue') { return '🏢'; }
                return '📝';
            }

            function filteredRequests() {
                return requests.filter(function(request) {
                    var matchesStatus = state.filters.status === 'all' || request.status === state.filters.status;
                    var matchesPriority = state.filters.priority === 'all' || request.priority === state.filters.priority;
                    return matchesStatus && matchesPriority;
                });
            }

            function renderStats() {
                var pending = requests.filter(function(r) { return r.status === 'pending'; }).length;
                var inProgress = requests.filter(function(r) { return r.status === 'in_progress'; }).length;
                var completed = requests.filter(function(r) { return r.status === 'completed'; }).length;
                var highPriority = requests.filter(function(r) { return r.priority === 'high'; }).length;

                var cards = [
                    { label: 'Pending', value: pending, tone: 'from-yellow-500 to-yellow-600', icon: '⏳' },
                    { label: 'In Progress', value: inProgress, tone: 'from-blue-500 to-blue-600', icon: '🔄' },
                    { label: 'Completed', value: completed, tone: 'from-green-500 to-green-600', icon: '✅' },
                    { label: 'High Priority', value: highPriority, tone: 'from-red-500 to-red-600', icon: '🚨' }
                ];

                statsContainer.innerHTML = cards.map(function(card) {
                    return (
                        '<div class="bg-primary p-6 rounded-lg shadow-sm border border-primary">' +
                            '<div class="flex items-center">' +
                                '<div class="w-8 h-8 rounded-full bg-gradient-to-br ' + card.tone + ' flex items-center justify-center text-white">' + card.icon + '</div>' +
                                '<div class="ml-4">' +
                                    '<p class="text-sm text-secondary">' + card.label + '</p>' +
                                    '<p class="text-2xl font-bold text-primary">' + card.value + '</p>' +
                                '</div>' +
                            '</div>' +
                        '</div>'
                    );
                }).join('');
            }

            function renderRequests() {
                var items = filteredRequests();
                listContainer.innerHTML = items.map(function(request) {
                    var startButton = request.status === 'pending' ? '<button class="px-3 py-2 bg-yellow-500 text-white text-sm rounded-lg hover:bg-yellow-600 transition-colors" data-action="start" data-request="' + request.id + '">Start</button>' : '';
                    var completeButton = request.status === 'in_progress' ? '<button class="px-3 py-2 bg-green-500 text-white text-sm rounded-lg hover:bg-green-600 transition-colors" data-action="complete" data-request="' + request.id + '">Complete</button>' : '';
                    return (
                        '\n                        <div class="bg-primary rounded-lg shadow-sm border border-primary p-6 hover:shadow-md transition-shadow" data-request="' + request.id + '">\n                            <div class="flex items-start justify-between">\n                                <div class="flex items-start space-x-4">\n                                    <div class="w-12 h-12 bg-tertiary rounded-full flex items-center justify-center text-xl">' + categoryIcon(request.category) + '</div>\n                                    <div class="flex-1">\n                                        <div class="flex items-center space-x-3 mb-2">\n                                            <h3 class="text-lg font-semibold text-primary">' + request.member + '</h3>\n                                            <span class="text-sm text-tertiary">(' + request.memberId + ')</span>\n                                            <span class="px-2 py-1 rounded-full text-xs font-semibold ' + priorityColor(request.priority) + '">' + request.priority + '</span>\n                                            <span class="px-2 py-1 rounded-full text-xs font-semibold ' + statusColor(request.status) + '">' + request.status.replace(/_/g, ' ') + '</span>\n                                        </div>\n                                        <h4 class="text-primary font-medium mb-1">' + request.request + '</h4>\n                                        <p class="text-sm text-secondary mb-2">' + request.description + '</p>\n                                        <div class="flex flex-wrap items-center gap-4 text-sm text-tertiary">\n                                            <span>📍 ' + request.location + '</span>\n                                            <span>⏰ ' + request.time + '</span>\n                                            <span>🏷️ ' + request.category + '</span>\n                                        </div>\n                                    </div>\n                                </div>\n                                <div class="flex flex-col space-y-2">\n                                    <button class="px-3 py-2 bg-blue-500 text-white text-sm rounded-lg hover:bg-blue-600 transition-colors" data-action="respond" data-request="' + request.id + '">Respond</button>\n                                    ' + startButton + '\n                                    ' + completeButton + '\n                                </div>\n                            </div>\n                        </div>\n                        '
                    );
                }).join('');

                emptyState.classList.toggle('hidden', items.length > 0);
            }

            function openModal(request) {
                state.selectedRequest = request;
                modalContent.innerHTML = (
                    '\n                    <div class="space-y-4">\n                        <div class="flex items-center space-x-3">\n                            <div class="w-12 h-12 bg-tertiary rounded-full flex items-center justify-center text-2xl">' + categoryIcon(request.category) + '</div>\n                            <div>\n                                <h3 class="text-lg font-semibold text-primary">' + request.member + '</h3>\n                                <p class="text-sm text-secondary">' + request.memberId + '</p>\n                            </div>\n                        </div>\n                        <div>\n                            <h4 class="font-medium text-secondary mb-2">Request Details</h4>\n                            <p class="text-primary mb-2">' + request.request + '</p>\n                            <p class="text-sm text-secondary">' + request.description + '</p>\n                        </div>\n                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-secondary">\n                            <div class="bg-secondary p-3 rounded-lg"><span class="font-medium text-tertiary">Priority:</span> <span class="ml-1 capitalize">' + request.priority + '</span></div>\n                            <div class="bg-secondary p-3 rounded-lg"><span class="font-medium text-tertiary">Status:</span> <span class="ml-1 capitalize">' + request.status.replace(/_/g, ' ') + '</span></div>\n                            <div class="bg-secondary p-3 rounded-lg"><span class="font-medium text-tertiary">Location:</span> <span class="ml-1">' + request.location + '</span></div>\n                            <div class="bg-secondary p-3 rounded-lg"><span class="font-medium text-tertiary">Reported:</span> <span class="ml-1">' + request.time + '</span></div>\n                        </div>\n                        <div>\n                            <label for="assistance-response-message" class="block text-sm font-medium text-secondary mb-2">Response Notes</label>\n                            <textarea id="assistance-response-message" rows="4" class="w-full px-3 py-2 border border-secondary rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" placeholder="Document your response or next steps..."></textarea>\n                        </div>\n                        <div class="flex justify-end space-x-3 pt-4 border-t border-primary">\n                            <button class="px-4 py-2 bg-tertiary text-secondary rounded-lg hover:bg-gray-300 transition-colors" data-action="close">Cancel</button>\n                            <button class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors" data-action="submit" data-request="' + request.id + '">Log Response</button>\n                        </div>\n                    </div>\n                ');
                modal.classList.remove('hidden');
            }

            function closeModal() {
                state.selectedRequest = null;
                modal.classList.add('hidden');
            }

            function updateStatus(id, newStatus) {
                requests = requests.map(function(request) {
                    if (request.id === id) {
                        return Object.assign({}, request, { status: newStatus });
                    }
                    return request;
                });
                renderStats();
                renderRequests();
            }

            function updateSubtitle(message) {
                subtitle.textContent = message;
                setTimeout(function() {
                    subtitle.textContent = 'Help members with their requests and issues';
                }, 1400);
            }

            document.getElementById('assistance-filter-status').addEventListener('change', function(event) {
                state.filters.status = event.target.value;
                renderRequests();
            });

            document.getElementById('assistance-filter-priority').addEventListener('change', function(event) {
                state.filters.priority = event.target.value;
                renderRequests();
            });

            listContainer.addEventListener('click', function(event) {
                var button = event.target.closest('button[data-action]');
                if (!button) { return; }
                var id = parseInt(button.getAttribute('data-request'), 10);
                var action = button.getAttribute('data-action');
                var request = requests.find(function(item) { return item.id === id; });
                if (!request) { return; }
                if (action === 'respond') {
                    openModal(request);
                } else if (action === 'start') {
                    updateStatus(id, 'in_progress');
                    updateSubtitle('Marked request as in progress');
                    showNotification('Request started for ' + request.member, 'success');
                } else if (action === 'complete') {
                    updateStatus(id, 'completed');
                    updateSubtitle('Request resolved successfully');
                    showNotification('Marked request complete for ' + request.member, 'success');
                }
            });

            modalContent.addEventListener('click', function(event) {
                var modalButton = event.target.closest('button[data-action]');
                if (!modalButton) { return; }
                var action = modalButton.getAttribute('data-action');
                if (action === 'close') {
                    closeModal();
                    return;
                }
                if (action === 'submit') {
                    var id = parseInt(modalButton.getAttribute('data-request'), 10);
                    var message = document.getElementById('assistance-response-message').value.trim();
                    if (message.length === 0) {
                        showNotification('Add response notes before submitting', 'error');
                        return;
                    }
                    updateStatus(id, 'in_progress');
                    updateSubtitle('Response recorded and member notified');
                    showNotification('Response logged successfully', 'success');
                    closeModal();
                }
            });

            document.getElementById('assistance-modal-close').addEventListener('click', closeModal);
            modal.addEventListener('click', function(event) {
                if (event.target === modal) {
                    closeModal();
                }
            });

            document.getElementById('assistance-new-request').addEventListener('click', function() {
                updateSubtitle('Starting new member request...');
                showNotification('New assistance request form opened', 'success');
            });

            document.getElementById('assistance-view-all').addEventListener('click', function() {
                state.filters.status = 'all';
                state.filters.priority = 'all';
                document.getElementById('assistance-filter-status').value = 'all';
                document.getElementById('assistance-filter-priority').value = 'all';
                renderRequests();
                updateSubtitle('Showing all assistance requests');
            });

            renderStats();
            renderRequests();
        });
    </script>
</body>
</html>
