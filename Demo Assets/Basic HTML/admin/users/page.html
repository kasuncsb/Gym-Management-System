<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
            
    <meta name="theme-color" content="#ffffff">
<title>User Management - PowerWorld Admin</title>
    <meta name="description" content="Monitor and manage members, staff and trainers from the admin dashboard.">
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="icon" href="../../images/logo.png">
</head>
<body>
    <div class="min-h-screen bg-secondary flex flex-col">
        <nav class="bg-primary text-primary py-4 px-6 relative z-10 border-b border-primary shadow-sm">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <a href="../../admin-dashboard.html" class="flex items-center space-x-3 group">
                        <img src="../../images/logo.png" alt="PowerWorld Fitness Logo" width="50" height="50" class="transition-transform group-hover:scale-105">
                        <span class="text-xl font-bold text-primary group-hover:text-red-500 transition-colors">PowerWorld Admin</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <div class="text-sm text-tertiary">System Administrator</div>
                        <div class="text-primary font-semibold">User Management</div>
                    </div>
                    <div class="w-10 h-10 bg-gradient-to-br from-red-500 to-red-600 rounded-full flex items-center justify-center">
                        <span class="text-white font-bold text-sm">A</span>
                    </div>
                </div>
            </div>
        </nav>

        <main class="flex-1 px-6 py-8">
            <div class="max-w-7xl mx-auto">
                <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
                    <div class="min-w-0">
                        <h1 class="text-3xl font-bold text-primary mb-2">User Management</h1>
                        <p class="text-secondary">Search, filter and review members, staff and trainers registered in the system.</p>
                    </div>
                    <div class="flex space-x-3">
                        <button type="button" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors">Add New User</button>
                        <button type="button" class="px-4 py-2 bg-tertiary text-secondary rounded-lg hover:bg-gray-300 transition-colors">Export Data</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-primary rounded-lg shadow-sm border border-primary p-6">
                        <p class="text-sm text-tertiary">Total Members</p>
                        <p class="text-3xl font-bold text-primary">842</p>
                        <p class="text-sm text-green-500 mt-2">+18 this week</p>
                    </div>
                    <div class="bg-primary rounded-lg shadow-sm border border-primary p-6">
                        <p class="text-sm text-tertiary">Staff Accounts</p>
                        <p class="text-3xl font-bold text-primary">32</p>
                        <p class="text-sm text-tertiary mt-2">4 pending onboarding</p>
                    </div>
                    <div class="bg-primary rounded-lg shadow-sm border border-primary p-6">
                        <p class="text-sm text-tertiary">Trainers</p>
                        <p class="text-3xl font-bold text-primary">12</p>
                        <p class="text-sm text-green-500 mt-2">Utilization 86%</p>
                    </div>
                </div>

                <div class="border-b border-primary mb-6">
                    <nav id="adminUserTabs" class="-mb-px flex space-x-8">
                        <button type="button" data-admin-users-tab="members" class="py-2 px-1 border-b-2 font-medium text-sm border-red-500 text-red-500" aria-selected="true">
                            Members (<span data-tab-count="members">0</span>)
                        </button>
                        <button type="button" data-admin-users-tab="staff" class="py-2 px-1 border-b-2 font-medium text-sm border-transparent text-tertiary hover:text-secondary hover:border-secondary">
                            Staff (<span data-tab-count="staff">0</span>)
                        </button>
                        <button type="button" data-admin-users-tab="trainers" class="py-2 px-1 border-b-2 font-medium text-sm border-transparent text-tertiary hover:text-secondary hover:border-secondary">
                            Trainers (<span data-tab-count="trainers">0</span>)
                        </button>
                    </nav>
                </div>

                <div class="flex flex-col gap-4 sm:flex-row mb-6">
                    <div class="flex-1 flex items-center space-x-3 bg-primary border border-primary rounded-lg px-4 py-3">
                        <svg class="w-5 h-5 text-quaternary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35m0 0A7 7 0 1010.7 17.7l6 6z" />
                        </svg>
                        <input id="userSearchInput" type="text" placeholder="Search by name, email or ID..." class="flex-1 focus:outline-none" autocomplete="off">
                    </div>
                    <div id="userRoleFilterWrapper" class="hidden">
                        <select id="userRoleFilter" class="px-4 py-3 border border-secondary rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                            <option value="all">All roles</option>
                            <option value="admin">Admin</option>
                            <option value="manager">Manager</option>
                            <option value="instructor">Instructor</option>
                            <option value="receptionist">Receptionist</option>
                        </select>
                    </div>
                    <button type="button" class="px-4 py-3 border border-secondary rounded-lg bg-primary hover:bg-secondary transition-colors">Advanced filters</button>
                </div>

                <div class="bg-primary rounded-lg shadow-sm border border-primary">
                    <div id="adminUsersTable"></div>
                </div>

                <div class="mt-8">
                    <a href="../../admin-dashboard.html" class="inline-flex items-center space-x-2 text-red-500 hover:text-red-600 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                        <span>Back to Admin Dashboard</span>
                    </a>
                </div>
            </div>
        </main>
    </div>

    <script src="../../js/main.js"></script>
</body>
</html>
