
# MySQL and Redis run natively on the host server — NOT in containers.
# Backend and Frontend containers reach them via host.docker.internal.
# On Linux, extra_hosts maps host.docker.internal to the host gateway automatically.
#
# ALL variables are sourced strictly from the root .env file.
# No defaults or fallbacks anywhere — set every variable explicitly.

services:

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT}:${BACKEND_INTERNAL_PORT}"
    environment:
      NODE_ENV:             ${NODE_ENV}
      PORT:                 ${BACKEND_INTERNAL_PORT}
      DB_HOST:              ${DB_HOST}
      DB_PORT:              ${DB_PORT}
      DB_USER:              ${DB_USER}
      DB_PASSWORD:          ${DB_PASSWORD}
      DB_NAME:              ${DB_NAME}
      REDIS_URL:            ${REDIS_URL}
      JWT_ACCESS_SECRET:    ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET:   ${JWT_REFRESH_SECRET}
      FRONTEND_URL:         ${FRONTEND_URL}
      SMTP_HOST:            ${SMTP_HOST}
      SMTP_PORT:            ${SMTP_PORT}
      SMTP_USER:            ${SMTP_USER}
      SMTP_PASSWORD:        ${SMTP_PASSWORD}
      EMAIL_FROM:           ${EMAIL_FROM}
      OCI_NAMESPACE:        ${OCI_NAMESPACE}
      OCI_BUCKET:           ${OCI_BUCKET}
      OCI_REGION:           ${OCI_REGION}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${BACKEND_INTERNAL_PORT}/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      redis:
        condition: service_started
    networks:
      - app

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - app

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: ${BACKEND_URL}
    restart: unless-stopped
    environment:
      NODE_ENV:     ${NODE_ENV}
      BACKEND_URL:  ${BACKEND_URL}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app

networks:
  app:
    driver: bridge
